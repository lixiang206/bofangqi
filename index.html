<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>しいなまひる的治愈音乐盒</title>
    <style>
        /* ==================== 1. 基础全局样式 ==================== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif;
            background: #f7ece1 url('img/beijing.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #5A4B41;
        }

        /* 樱花画布背景 */
        #sakura-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        /* ==================== 2. 主播放器容器容器 ==================== */
        .player-container {
            position: relative;
            z-index: 10;
            width: 900px;
            max-width: 95%;
            height: 550px;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 50px rgba(90, 75, 65, 0.15);
            display: flex;
            padding: 30px;
            gap: 30px;
        }

        /* ==================== 3. 左侧面板（黑胶片与控制区） ==================== */
        .left-panel {
            flex: 1.1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        /* 唱片机区域结构 */
        .turntable-area {
            position: relative;
            width: 240px;
            height: 240px;
            margin-top: 15px;
        }

        /* 频谱画布 */
        #visualizer {
            position: absolute;
            top: -20px;
            left: -20px;
            width: 280px;
            height: 280px;
            z-index: 2;
            pointer-events: none;
        }

        /* 黑胶唱片 */
        .disc-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: #111;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3;
            animation: rotateDisc 20s linear infinite;
            animation-play-state: paused;
        }
        @keyframes rotateDisc { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .disc-center {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: url('img/changpian.jpg') no-repeat center center;
            background-size: cover;
            border: 4px solid #222;
        }

        /* 唱针 */
        .tonearm {
            position: absolute;
            top: -15px;
            right: 20px;
            width: 80px;
            height: 120px;
            background: url('img/changzhen.png') no-repeat top right;
            background-size: contain;
            z-index: 5;
            transform-origin: top right;
            transform: rotate(-25deg);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }
        .tonearm.playing { transform: rotate(2deg); }

        /* 歌曲元数据 */
        .song-meta { text-align: center; margin: 15px 0 5px 0; width: 100%; }
        .song-title { font-size: 1.4rem; font-weight: 600; color: #4A3C32; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
        .song-artist { font-size: 0.9rem; color: #8A766A; }

        /* 进度条控制 */
        .progress-block { width: 100%; margin: 10px 0; }
        .progress-bar-container { width: 100%; height: 6px; background: rgba(90, 75, 65, 0.15); border-radius: 3px; cursor: pointer; position: relative; }
        .progress-bar { width: 0%; height: 100%; background: #E6C594; border-radius: 3px; transition: width 0.1s linear; }
        .time-indicator { display: flex; justify-content: space-between; font-size: 0.75rem; color: #8A766A; margin-top: 5px; }

        /* 按钮主控制网格 */
        .control-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .btn {
            background: #F4E4D4; border: none; color: #5A4B41; 
            padding: 10px 18px; border-radius: 20px; font-weight: 600; 
            cursor: pointer; transition: all 0.3s ease; font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(90, 75, 65, 0.08);
        }
        .btn:hover { background: #E6C594; color: white; transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        .btn-circle { width: 42px; height: 42px; border-radius: 50%; padding: 0; display: flex; justify-content: center; align-items: center; font-size: 1.1rem; }
        
        /* 文件夹导入与输入组 */
        .import-group { display: flex; width: 100%; gap: 10px; }
        .btn-folder { flex: 1; background: #DEB887; color: white; }
        .btn-folder:hover { background: #CD853F; }

        .wyy-panel { width: 100%; display: flex; gap: 8px; border-top: 1px dashed rgba(90,75,65,0.15); padding-top: 15px; }
        .wyy-input { flex: 1; border: 1px solid rgba(90,75,65,0.25); background: rgba(255,255,255,0.5); padding: 0 15px; border-radius: 20px; height: 38px; font-size: 0.85rem; color: #5A4B41; outline: none; }
        .wyy-input:focus { border-color: #E6C594; background: white; }
        .btn-wyy { background: #8B4513; color: white; border-radius: 20px; padding: 0 20px; height: 38px; }
        .btn-wyy:hover { background: #A0522D; }

        /* ==================== 4. 右侧面板（多标签歌单列表） ==================== */
        .right-panel {
            flex: 1;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 标签导航栏 */
        .tab-header { display: flex; background: rgba(90, 75, 65, 0.05); border-bottom: 1px solid rgba(90, 75, 65, 0.08); }
        .tab-item { flex: 1; text-align: center; padding: 14px 0; font-size: 0.85rem; font-weight: 600; color: #8A766A; cursor: pointer; transition: all 0.2s ease; position: relative; }
        .tab-item:hover { color: #5A4B41; background: rgba(255,255,255,0.3); }
        .tab-item.active { color: #5A4B41; background: rgba(255,255,255,0.5); }
        .tab-item.active::after { content: ''; position: absolute; bottom: 0; left: 25%; width: 50%; height: 3px; background: #E6C594; border-radius: 2px; }
        .tab-count { font-size: 0.75rem; font-weight: normal; opacity: 0.7; margin-left: 2px; }

        /* 列表滚动机能 */
        .track-list-scroller { flex: 1; overflow-y: auto; padding: 10px; }
        .track-list-scroller::-webkit-scrollbar { width: 5px; }
        .track-list-scroller::-webkit-scrollbar-thumb { background: rgba(90, 75, 65, 0.2); border-radius: 3px; }
        
        .track-list { list-style: none; }
        .track-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 11px 16px; margin-bottom: 6px; border-radius: 14px;
            cursor: pointer; transition: all 0.2s ease; font-size: 0.88rem;
        }
        .track-item:hover { background: rgba(255, 255, 255, 0.6); transform: translateX(2px); }
        .track-item.active { background: #5A4B41; color: #FFFBF0; font-weight: 500; }
        .track-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 10px; }
        .track-dl-icon { font-size: 0.95rem; opacity: 0.6; transition: opacity 0.2s; cursor: pointer; padding: 2px; }
        .track-dl-icon:hover { opacity: 1; transform: scale(1.1); }
        .track-item.active .track-dl-icon { filter: brightness(3); }

        /* ==================== 5. 移动端全屏流式激活安全锁 ==================== */
        .mobile-unlock-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(247, 236, 225, 0.96); z-index: 999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px;
        }
        .unlock-avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .unlock-tips { color: #5A4B41; font-size: 1rem; font-weight: 500; text-align: center; line-height: 1.6; }

        /* 移动端响应式拦截 */
        @media (max-width: 768px) {
            .player-container { flex-direction: column; height: auto; max-height: 92vh; padding: 20px; gap: 15px; }
            .left-panel { flex: none; }
            .turntable-area { width: 160px; height: 160px; margin-top: 5px; }
            .disc-wrapper { width: 160px; height: 160px; }
            .disc-center { width: 70px; height: 70px; }
            #visualizer { width: 200px; height: 200px; top: -20px; left: -20px; }
            .tonearm { width: 55px; height: 80px; right: 5px; top: -10px; }
            .song-meta .song-title { font-size: 1.1rem; }
            .right-panel { height: 220px; }
            .character-box { display: none !important; } /* 移动端由于屏幕窄，直接屏蔽挂件防止穿帮 */
        }

        /* ==================== 6. 真昼立牌与对话气泡组件样式（彻底远离中央，防止遮挡歌词） ==================== */
        .character-box { 
            position: absolute !important; 
            bottom: -65px !important;    /* 强行下沉，降低纸片人物理高度 */
            right: 10px !important;      /* 强行贴紧右侧屏幕边缘，拉开与左侧中央的距离 */
            width: 220px !important; 
            height: 350px !important; 
            z-index: 20 !important; 
        }
        
        .mahiru-character { 
            width: 100%; 
            height: 100%; 
            cursor: pointer; 
            transition: all 0.5s ease; 
            background: url('img/lihui.png') no-repeat bottom center; 
            background-size: contain; 
            -webkit-user-drag: none; 
        }
        
        .character-box:hover .mahiru-character { 
            transform: translateY(-10px); 
        }
        
        /* 对话框气泡重构：向右侧收拢压缩空间 */
        .dialogue-bubble { 
            position: absolute !important; 
            bottom: 290px !important;    /* 压低高度，紧靠立牌头部 */
            right: 25px !important;     /* 往右侧推，避免向左触及长歌词 */
            background: rgba(255, 255, 255, 0.85) !important; 
            backdrop-filter: blur(8px) !important; 
            padding: 8px 12px !important; 
            border-radius: 16px !important; 
            font-size: 0.82rem !important; /* 收缩字号，防止气泡异常变宽 */
            box-shadow: 0 5px 15px rgba(0,0,0,0.08) !important; 
            opacity: 0; 
            transform: translateY(10px); 
            transition: all 0.4s ease; 
            pointer-events: none; 
            width: 180px !important;     /* 宽度大幅压缩，腾出左侧无阻挡大空间 */
            max-height: 55px !important; /* 限制高度上限 */
            overflow: hidden; 
            z-index: 21 !important; 
            text-align: left; 
            line-height: 1.4; 
        }
        
        /* 气泡指示箭嘴定位右移，指向真昼 */
        .dialogue-bubble::after { 
            content: ''; 
            position: absolute; 
            bottom: -8px; 
            right: 25px; 
            border-width: 8px 8px 0; 
            border-style: solid; 
            border-color: rgba(255, 255, 255, 0.85) transparent; 
        }
        
        /* 触发显示状态 */
        .character-box:hover .dialogue-bubble { 
            opacity: 1 !important; 
            transform: translateY(0) !important; 
        }
    </style>
</head>
<body>

    <canvas id="sakura-canvas"></canvas>

    <audio id="myAudio" preload="auto"></audio>

    <div id="mobileTouchUnlock" class="mobile-unlock-layer">
        <img src="img/changpian.jpg" class="unlock-avatar" alt="mahiru">
        <div class="unlock-tips">
            ❀ 椎名真昼的治愈音乐盒 ❀<br>
            点击下方按钮，开始聆听美妙旋律
        </div>
        <button id="unlockBtn" class="btn">进入音乐盒</button>
    </div>

    <div class="player-container">
        
        <div class="left-panel">
            <div class="turntable-area">
                <canvas id="visualizer"></canvas>
                <div id="disc" class="disc-wrapper">
                    <div class="disc-center"></div>
                </div>
                <div id="tonearm" class="tonearm"></div>
            </div>

            <div class="song-meta">
                <div id="songTitle" class="song-title">载入中...</div>
                <div id="songArtist" class="song-artist">请稍候</div>
            </div>

            <div class="progress-block">
                <div id="progressBarContainer" class="progress-bar-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
                <div class="time-indicator">
                    <span id="currentTime">00:00</span>
                    <span id="totalTime">00:00</span>
                </div>
            </div>

            <div class="control-row">
                <button id="modeBtn" class="btn btn-circle" title="列表循环">🔁</button>
                <button id="prevBtn" class="btn btn-circle">⏮</button>
                <button id="playBtn" class="btn">播放</button>
                <button id="nextBtn" class="btn btn-circle">⏭</button>
                <button id="currentDlBtn" class="btn btn-circle" title="下载当前歌曲">📥</button>
            </div>

            <div class="import-group">
                <button id="selectFolderBtn" class="btn btn-folder">📁 打开本地其它文件夹</button>
            </div>

            <div class="wyy-panel">
                <input type="text" id="wyyIdInput" class="wyy-input" placeholder="输入网易云歌曲 ID">
                <button id="wyyDlBtn" class="btn btn-wyy">直接播放</button>
            </div>
        </div>

        <div class="right-panel">
            <div class="tab-header">
                <div id="tabMahiru" class="tab-item active">真昼歌单 (<span id="mahiruCount">0</span>)</div>
                <div id="tabOnline" class="tab-item">内置歌单 (<span id="onlineCount">0</span>)</div>
                <div id="tabLocal" class="tab-item">本地文件夹 (<span id="localCount">0</span>)</div>
            </div>
            <div class="track-list-scroller">
                <ul id="trackList" class="track-list">
                    </ul>
            </div>
        </div>

        <div class="character-box">
            <div id="bubble" class="dialogue-bubble">
                ♪ 正在等待主人点歌呢...
            </div>
            <div id="mahiruSkin" class="mahiru-character"></div>
        </div>

    </div>

    <script>
        const VERCEL_URL = window.location.origin; 
        const supabaseBaseUrl = "https://dqfnxybsrbheeatzxxjg.supabase.co/storage/v1/object/public/music/";
        
        const audio = document.getElementById('myAudio');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const modeBtn = document.getElementById('modeBtn');
        const currentDlBtn = document.getElementById('currentDlBtn');
        const selectFolderBtn = document.getElementById('selectFolderBtn');
        const disc = document.getElementById('disc');
        const tonearm = document.getElementById('tonearm');
        const songTitle = document.getElementById('songTitle');
        const songArtist = document.getElementById('songArtist');
        const trackListUI = document.getElementById('trackList');
        const mahiruSkin = document.getElementById('mahiruSkin');
        const bubble = document.getElementById('bubble');
        const progressBarContainer = document.getElementById('progressBarContainer');
        const progressBar = document.getElementById('progressBar');
        const currentTimeUI = document.getElementById('currentTime');
        const totalTimeUI = document.getElementById('totalTime');
        const wyyIdInput = document.getElementById('wyyIdInput');
        const wyyDlBtn = document.getElementById('wyyDlBtn');
        
        const tabMahiru = document.getElementById('tabMahiru');
        const tabOnline = document.getElementById('tabOnline');
        const tabLocal = document.getElementById('tabLocal');
        const mahiruCountUI = document.getElementById('mahiruCount');
        const onlineCountUI = document.getElementById('onlineCount');
        const localCountUI = document.getElementById('localCount');

        const mobileTouchUnlock = document.getElementById('mobileTouchUnlock');
        const unlockBtn = document.getElementById('unlockBtn');

        let currentMode = 'mahiru', mahiruSongs = [], onlineSongs = [], localSongs = [], currentIndex = 0;        
        let playMode = 'loop'; 
        let currentPlayingInfo = { name: "", url: "" };

        let currentLyrics = []; 
        let listenTime = parseInt(localStorage.getItem('mahiru_listen_time')) || 0; 
        let mahiruLevel = parseInt(localStorage.getItem('mahiru_level')) || 1;
        let bubbleTimer = null;
        let audioCtx, analyser, source, canvas, ctx, bufferLength, dataArray;
        let isWyyPlaying = false; 

        function isMobileDevice() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768;
        }

        function getMahiruGreeting() {
            const hour = new Date().getHours();
            if (hour >= 5 && hour < 9) return "早上好，早餐已经准备好了哦，今天也要精神满满呢。";
            if (hour >= 9 && hour < 12) return "上午好~ 有好好的在专心工作或学习吗？";
            if (hour >= 12 && hour < 14) return "午休时间到了，先吃个午饭，再听两首舒缓的歌吧。";
            if (hour >= 14 && hour < 18) return "下午茶时间，要来一杯红茶，配上点心吗？";
            if (hour >= 18 && hour < 23) return "辛苦了一天，欢迎回来。今晚想听什么旋律呢？";
            return "已经很晚很晚了哦，听完这首歌就早点睡吧，熬夜真不是好习惯呢。";
        }

        function showBubbleWithTimer(text, duration = 4000) {
            if (bubbleTimer) clearTimeout(bubbleTimer);
            bubble.innerText = text;
            bubble.style.opacity = '1';
            bubbleTimer = setTimeout(() => {
                if (bubble.dataset.isClicking !== "true") bubble.style.opacity = '0';
            }, duration);
        }

        function unlockMobileAudio() {
            audio.play().then(() => { audio.pause(); }).catch(e => console.log('激活中...'));
            mobileTouchUnlock.style.display = 'none';
            showBubbleWithTimer(getMahiruGreeting(), 5000);
            updateMediaSession(); 
        }
        unlockBtn.addEventListener('click', unlockMobileAudio);
        mobileTouchUnlock.addEventListener('click', unlockMobileAudio);

        async function initOnlinePlaylist() {
            try {
                const response = await fetch('./music/list.json');
                if (!response.ok) throw new Error('无法读取 list.json');
                const songsData = await response.json();
                
                if(songsData.mahiruSongs) {
                    mahiruSongs = songsData.mahiruSongs.map(song => ({ name: song.title, url: supabaseBaseUrl + encodeURIComponent(song.file) }));
                }
                if(songsData.onlineSongs) {
                    onlineSongs = songsData.onlineSongs.map(song => ({ name: song.title, url: supabaseBaseUrl + encodeURIComponent(song.file) }));
                }
                
                mahiruCountUI.innerText = mahiruSongs.length;
                onlineCountUI.innerText = onlineSongs.length;
                
                if(currentMode === 'mahiru') { 
                    renderPlaylist(); 
                    if (mahiruSongs.length > 0) loadSong(0, false); 
                }
            } catch (err) {
                trackListUI.innerHTML = `<li style="color: #ff7875; text-align: center; padding-top: 40px;">歌单初始化失败</li>`;
            }
        }

        function initBondSystem() {
            setInterval(() => {
                if (audio && !audio.paused) {
                    listenTime += 1;
                    localStorage.setItem('mahiru_listen_time', listenTime);
                    
                    const newLevel = Math.floor(listenTime / 60) + 1;
                    if (newLevel > mahiruLevel) {
                        mahiruLevel = newLevel;
                        localStorage.setItem('mahiru_level', mahiruLevel);
                        showBubbleWithTimer(`❀ 羁绊提升！真昼与你的好感度达到了 Lv.${mahiruLevel} ❀`, 5000);
                    }
                }
            }, 1000);

            mahiruSkin.addEventListener('click', () => {
                bubble.dataset.isClicking = "true"; 
                let dialoguePool = [
                    "别突然戳我呀...",
                    "听音乐的时候要保持好心情哦。",
                    "这首歌，我也很喜欢呢。"
                ];
                if (mahiruLevel >= 3) dialoguePool.push(`我们已经相伴听歌 ${Math.floor(listenTime/60)} 分钟了，真希望时间走得慢一点...`);
                if (mahiruLevel >= 5) {
                    dialoguePool.push("哪怕全世界都不站在你这边，我也一定会陪在你的身边。");
                    dialoguePool.push("（真昼悄悄看着你，脸上多了一抹红晕...）");
                }
                const randomText = dialoguePool[Math.floor(Math.random() * dialoguePool.length)];
                showBubbleWithTimer(randomText, 4000);
                setTimeout(() => { bubble.dataset.isClicking = "false"; }, 4000);
            });
        }

        function parseLyric(lrcText) {
            const lines = lrcText.split('\n');
            const result = [];
            const timeReg = /\[(\d+):(\d+)\.(\d+)\]/;
            lines.forEach(line => {
                const match = timeReg.exec(line);
                if (match) {
                    const minutes = parseInt(match[1]);
                    const seconds = parseInt(match[2]);
                    const ms = parseInt(match[3]);
                    const time = minutes * 60 + seconds + (ms / 1000);
                    const text = line.replace(timeReg, '').trim();
                    if (text) result.push({ time, text });
                }
            });
            return result.sort((a, b) => a.time - b.time);
        }

        audio.addEventListener('timeupdate', () => {
            if (currentLyrics.length === 0 || bubble.dataset.isClicking === "true") return;
            const currentTime = audio.currentTime;
            let activeLyric = "";
            for (let i = 0; i < currentLyrics.length; i++) {
                if (currentTime >= currentLyrics[i].time) {
                    activeLyric = currentLyrics[i].text;
                } else {
                    break;
                }
            }
            if (activeLyric) {
                bubble.innerText = "♪ " + activeLyric;
                bubble.style.opacity = '1';
            }
        });

        function initVisualizer() {
            if (audioCtx) return; 
            canvas = document.getElementById('visualizer');
            ctx = canvas.getContext('2d');
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            
            if (isWyyPlaying) {
                audio.removeAttribute("crossOrigin");
            } else {
                audio.crossOrigin = "anonymous"; 
            }
            
            try {
                source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                
                analyser.fftSize = 64; 
                bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                drawVisualizer();
            } catch (e) {
                console.log("AudioContext 绑定受限");
            }
        }

        function drawVisualizer() {
