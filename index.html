<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>しいなまひる的治愈音乐盒</title>
    <style>
        :root {
            --mahiru-gold: #F5E6CC;      
            --mahiru-pink: #FFF0F5;      
            --mahiru-blue: #E6F2FF;      
            --text-color: #5A4B41;       
            --accent-gold: #E6C594;
        }

        /* 核心修复：彻底锁死根节点，防止任何形式的滚动溢出白边 */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            height: 100vh; height: 100dvh;
            overflow: hidden;
            background-color: #f7ede2; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
        }

        /* 新增：独立背景层，与内容分离，100%全屏覆盖 */
        .bg-layer {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh; height: 100dvh;
            background: url('img/HLLn5bJa0AArBQe.jpg') no-repeat center center;
            background-size: cover !important;
            z-index: 1;
        }

        .decorations {
            position: fixed; width: 100vw; height: 100vh; height: 100dvh; top: 0; left: 0;
            pointer-events: none; z-index: 10000000 !important; 
        }

        .petal {
            position: absolute; background: linear-gradient(135deg, #FFC0CB, #F5E6CC); 
            opacity: 0.92 !important; border-radius: 50% 0 50% 50%;
            animation: float linear infinite; transform-origin: center;
            box-shadow: 1px 1px 3px rgba(90, 75, 65, 0.15);
        }

        @keyframes float {
            0% { transform: translateY(-50px) translateX(0) rotate(0deg) scale(var(--petal-scale, 1)); opacity: 0; }
            10% { opacity: 0.92; }
            90% { opacity: 0.92; }
            100% { transform: translateY(105vh) translateX(180px) rotate(450deg) scale(var(--petal-scale, 1)); opacity: 0; }
        }

        /* 核心重构内容容器 */
        .main-wrapper { 
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            gap: 30px; z-index: 2; box-sizing: border-box;
            overflow-x: hidden; overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            padding: 40px 20px;
        }

        /* 毛玻璃模糊透明效果 */
        .player-container {
            background: rgba(255, 255, 255, 0.45); 
            backdrop-filter: blur(20px) saturate(140%); 
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            padding: 35px 30px 25px; border-radius: 28px; 
            border: 2px solid rgba(255, 255, 255, 0.5); 
            box-shadow: 0 15px 35px rgba(90, 75, 65, 0.1), 0 0 20px rgba(255, 255, 255, 0.2);
            text-align: center; width: 320px; flex-shrink: 0;
        }

        .disc-area { position: relative; width: 200px; height: 200px; margin: 0 auto 20px; }

        .tonearm {
            position: absolute; top: -10px; right: 20px; width: 35px; height: 70px; background: #8B7E74;
            transform-origin: top center; transform: rotate(-25deg); transition: transform 0.5s ease; z-index: 10;
            clip-path: polygon(40% 0%, 60% 0%, 60% 80%, 100% 100%, 0% 100%);
        }
        .tonearm.playing { transform: rotate(0deg); }

        .disc {
            width: 100%; height: 100%; border-radius: 50%;
            background: repeating-radial-gradient(#222, #111 4px, #222 5px);
            border: 8px solid #2d2d2d; box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            display: flex; justify-content: center; align-items: center;
            animation: rotateDisc 15s linear infinite; animation-play-state: paused;
        }

        .disc-cover { width: 100px; height: 100px; border-radius: 50%; background: url('img/changpian.jpg') no-repeat center; background-size: cover; border: 3px solid #000; }
        @keyframes rotateDisc { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .song-title { font-size: 1.15rem; font-weight: bold; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-artist { font-size: 0.85rem; opacity: 0.75; margin-bottom: 15px; }

        .progress-wrapper { margin-bottom: 20px; padding: 0 5px; }
        .progress-bar-container { width: 100%; height: 6px; background: rgba(90, 75, 65, 0.15); border-radius: 10px; cursor: pointer; position: relative; margin-bottom: 6px; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent-gold), var(--text-color)); border-radius: 10px; position: absolute; top: 0; left: 0; transition: width 0.1s linear; }
        .time-info { display: flex; justify-content: space-between; font-size: 0.75rem; opacity: 0.7; }

        /* 播放控制栏容器 */
        .controls { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 15px; }
        .controls button { background: var(--text-color); color: #fff; border: none; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 10px rgba(90, 75, 65, 0.2); }
        .btn-main { padding: 12px 22px; font-size: 1rem; border-radius: 50px; }
        .btn-side { padding: 10px 14px; font-size: 0.9rem; border-radius: 50%; }
        /* 模式与新按钮小修饰 */
        .btn-mode, .btn-current-dl { padding: 10px 12px; font-size: 0.85rem; border-radius: 50%; background: #A79284 !important; }
        .controls button:hover { transform: scale(1.08); background: #7A695E; }

        .btn-folder { background: #A79284 !important; padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; color: white; border: none; cursor: pointer; transition: background 0.2s; width: 100%; box-sizing: border-box; }
        .btn-folder:hover { background: #8B7E74; }

        .wyy-download-box { margin-top: 15px; border-top: 1px dashed var(--accent-gold); padding-top: 15px; display: flex; gap: 8px; justify-content: center; align-items: center; }
        .wyy-input { width: 60%; padding: 6px 12px; border: 1px solid var(--accent-gold); border-radius: 20px; outline: none; font-size: 0.8rem; color: var(--text-color); background: rgba(255, 255, 255, 0.4); transition: all 0.2s; }
        .wyy-input:focus { background: rgba(255, 255, 255, 0.8); border-color: var(--text-color); }
        .wyy-btn { background: var(--text-color); color: white; border: none; padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; white-space: nowrap; box-shadow: 0 2px 6px rgba(90, 75, 65, 0.15); transition: all 0.2s; }
        .wyy-btn:hover { background: #7A695E; transform: scale(1.05); }
        .wyy-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        /* 右侧组合容器：歌单与歌词垂直排列 */
        .right-container {
            display: flex; flex-direction: column; gap: 20px; width: 340px; height: 500px; flex-shrink: 0;
        }

        /* 歌单面板透亮毛玻璃效果 */
        .playlist-container {
            background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(20px) saturate(140%);
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            padding: 20px; border-radius: 24px; flex: 1;
            box-shadow: 0 15px 35px rgba(90, 75, 65, 0.05); border: 2px solid rgba(255, 255, 255, 0.4);
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* 歌词面板设计 */
        .lyrics-container {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(20px) saturate(140%);
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            padding: 15px; border-radius: 24px; height: 160px;
            box-shadow: 0 10px 25px rgba(90, 75, 65, 0.05); border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex; flex-direction: column; overflow: hidden; text-align: center; position: relative;
        }
        .lyrics-wrapper {
            overflow-y: auto; flex-grow: 1; scroll-behavior: smooth; padding: 10px 0;
        }
        .lyrics-wrapper::-webkit-scrollbar { width: 0px; display: none; }
        .lyric-line {
            font-size: 0.85rem; padding: 6px 10px; line-height: 1.4; opacity: 0.4; transition: all 0.3s ease;
        }
        .lyric-line.active {
            opacity: 1; font-weight: bold; font-size: 0.95rem; color: #7A695E; transform: scale(1.02);
        }

        .playlist-tabs { display: flex; gap: 8px; margin-bottom: 15px; border-bottom: 2px solid rgba(90, 75, 65, 0.15); padding-bottom: 8px; justify-content: space-between; }
        .tab-btn { background: none; border: none; font-size: 0.82rem; font-weight: bold; color: var(--text-color); opacity: 0.6; cursor: pointer; padding: 0 2px; transition: opacity 0.2s; white-space: nowrap; }
        .tab-btn.active { opacity: 1; position: relative; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -10px; left: 0; width: 100%; height: 3px; background: var(--text-color); border-radius: 2px; }

        .track-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex-grow: 1; }
        .track-list::-webkit-scrollbar { width: 6px; }
        .track-list::-webkit-scrollbar-thumb { background: rgba(90, 75, 65, 0.2); border-radius: 10px; }

        .track-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; 
            transition: all 0.2s ease; margin-bottom: 4px; gap: 8px;
        }
        .track-item:hover { background: rgba(255, 255, 255, 0.3); }
        .track-item.active { background: var(--text-color); color: #fff; font-weight: bold; }

        .track-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-grow: 1; }
        
        .track-dl-icon { 
            font-size: 1.05rem; cursor: pointer; padding: 2px 6px; border-radius: 4px;
            transition: all 0.2s; color: var(--text-color); opacity: 0.6; flex-shrink: 0;
        }
        .track-dl-icon:hover { opacity: 1; background: rgba(255, 255, 255, 0.5); transform: scale(1.15); }
        .track-item.active .track-dl-icon { color: #fff; opacity: 0.8; }
        .track-item.active .track-dl-icon:hover { opacity: 1; background: rgba(0,0,0,0.15); }

        /* 真昼立牌与外链 */
        .character-box { position: absolute; bottom: -20px; right: 30px; width: 220px; height: 350px; z-index: 3; }
        .mahiru-character { width: 100%; height: 100%; cursor: pointer; transition: all 0.5s ease; background: url('img/lihui.png') no-repeat bottom center; background-size: contain; }
        .character-box:hover .mahiru-character { transform: translateY(-10px); }
        .dialogue-bubble { position: absolute; bottom: 310px; right: 10px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(8px); padding: 10px 16px; border-radius: 16px; font-size: 0.85rem; box-shadow: 0 5px 15px rgba(0,0,0,0.08); opacity: 0; transform: translateY(10px); transition: all 0.4s ease; pointer-events: none; white-space: nowrap; z-index: 4; }
        .dialogue-bubble::after { content: ''; position: absolute; bottom: -8px; right: 40px; border-width: 8px 8px 0; border-style: solid; border-color: rgba(255, 255, 255, 0.85) transparent; }
        .character-box:hover .dialogue-bubble { opacity: 1; transform: translateY(0); }

        .mahiru-link-btn { position: absolute; top: 10px; left: -60px; width: 54px; height: 54px; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 4px 12px rgba(90, 75, 65, 0.25); background: url('img/changpian.jpg') no-repeat center; background-size: cover; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 5; animation: buttonPulse 2s infinite ease-in-out; }
        .mahiru-link-btn:hover { transform: scale(1.15) rotate(20deg); box-shadow: 0 6px 16px rgba(230, 197, 148, 0.6); border-color: var(--accent-gold); }
        .link-tooltip { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); background: rgba(90, 75, 65, 0.9); color: #fff; padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; white-space: nowrap; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
        .mahiru-link-btn:hover .link-tooltip { opacity: 1; }

        @keyframes buttonPulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        /* 移动端高级适配 */
        @media (max-width: 768px) {
            .bg-layer { background: url('img/xiaoermo.jpg') no-repeat center center; background-size: cover !important; }
            .main-wrapper { flex-direction: column; justify-content: flex-start; align-items: center; gap: 25px; padding: 25px 15px 140px; }
            .player-container, .right-container { width: 100%; max-width: 340px; box-sizing: border-box; }
            .right-container { height: auto; }
            .playlist-container { height: 260px; }
            .character-box { position: fixed !important; width: 90px; height: 145px; right: 10px; bottom: 10px; opacity: 0.95; z-index: 999999 !important; pointer-events: auto; }
            .mahiru-character { background-size: contain; }
            .character-box:hover .mahiru-character { transform: none !important; }
            .dialogue-bubble { position: fixed !important; bottom: 155px; right: 10px; font-size: 0.75rem; padding: 6px 12px; z-index: 1000000 !important; transform: translateY(0) !important; }
            .dialogue-bubble::after { right: 25px; }
            .mahiru-link-btn { top: -50px; left: 20px; width: 40px; height: 40px; }
            #mobileTouchUnlock { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; height: 100dvh; background: rgba(90, 75, 65, 0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 99999; display: flex; justify-content: center; align-items: center; color: #5A4B41; font-weight: bold; }
            .unlock-box { background: rgba(255, 255, 255, 0.95); padding: 25px 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.15); border: 2px solid var(--mahiru-gold); }
            .unlock-box button { background: #A79284; color: white; border: none; padding: 10px 24px; border-radius: 50px; font-size: 0.9rem; cursor: pointer; }
        }
        @media (min-width: 769px) { #mobileTouchUnlock { display: none !important; } }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <div id="mobileTouchUnlock">
        <div class="unlock-box">
            <p>❀ 欢迎来到しいなまひる的治愈音乐盒 ❀<br><small style="color:#888; font-weight:normal;">点击下方按钮解锁手机端音频</small></p>
            <button id="unlockBtn">进入音乐盒</button>
        </div>
    </div>

    <div class="decorations" id="decorations"></div>

    <div class="main-wrapper">
        <div class="player-container">
            <div class="disc-area">
                <div class="tonearm" id="tonearm"></div>
                <div class="disc" id="disc"><div class="disc-cover"></div></div>
            </div>

            <div class="song-title" id="songTitle">正在加载歌单...</div>
            <div class="song-artist" id="songArtist">请稍候</div>

            <div class="progress-wrapper">
                <div class="progress-bar-container" id="progressBarContainer"><div class="progress-bar" id="progressBar"></div></div>
                <div class="time-info"><span id="currentTime">00:00</span><span id="totalTime">00:00</span></div>
            </div>

            <div class="controls">
                <button class="btn-side" id="prevBtn" title="上一首">⏮</button>
                <button class="btn-main" id="playBtn">播放</button>
                <button class="btn-side" id="nextBtn" title="下一首">⏭</button>
                <button class="btn-mode" id="modeBtn" title="切换播放模式">🔁</button>
                <button class="btn-current-dl" id="currentDlBtn" title="下载当前播放的这首歌">📥</button>
            </div>

            <button class="btn-folder" id="selectFolderBtn">📂 打开本地其它文件夹</button>

            <div class="wyy-download-box">
                <input type="text" id="wyyIdInput" class="wyy-input" placeholder="输入网易云歌曲 ID">
                <button id="wyyDlBtn" class="wyy-btn">直接播放</button>
            </div>
            <audio id="myAudio"></audio>
        </div>

        <div class="right-container">
            <div class="playlist-container">
                <div class="playlist-tabs">
                    <button class="tab-btn active" id="tabMahiru">真昼歌单 (<span id="mahiruCount">0</span>)</button>
                    <button class="tab-btn" id="tabOnline">内置歌单 (<span id="onlineCount">0</span>)</button>
                    <button class="tab-btn" id="tabLocal">本地文件夹 (<span id="localCount">0</span>)</button>
                </div>
                <ul class="track-list" id="trackList">
                    <li style="color: #5A4B41; text-align: center; padding-top: 50px; opacity:0.6;">正在加载网页歌单...</li>
                </ul>
            </div>

            <div class="lyrics-container">
                <div class="lyrics-wrapper" id="lyricsWrapper">
                    <div class="lyric-line" style="opacity: 0.6; padding-top: 40px;">🎵 治愈音乐盒 · 伴你度过每一天</div>
                </div>
            </div>
        </div>
    </div>

    <div class="character-box" id="characterBox">
        <div class="mahiru-link-btn" onclick="window.open('https://www.fsdm02.com/vodplay/WNsJJJJk-1-1.html', '_blank')" title="前往播放页">
            <div class="link-tooltip">去看真昼吧~</div>
        </div>
        <div class="mahiru-character" id="mahiruSkin"></div>
        <div class="dialogue-bubble" id="bubble">今天想听什么歌呢？</div>
    </div>

    <script>
        const VERCEL_URL = window.location.origin; 

        const supabaseBaseUrl = "https://dqfnxybsrbheeatzxxjg.supabase.co/storage/v1/object/public/music/";
        const audio = document.getElementById('myAudio');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const modeBtn = document.getElementById('modeBtn');
        const currentDlBtn = document.getElementById('currentDlBtn'); 
        const selectFolderBtn = document.getElementById('selectFolderBtn');
        const disc = document.getElementById('disc');
        const tonearm = document.getElementById('tonearm');
        const songTitle = document.getElementById('songTitle');
        const songArtist = document.getElementById('songArtist');
        const trackListUI = document.getElementById('trackList');
        const mahiruSkin = document.getElementById('mahiruSkin');
        const bubble = document.getElementById('bubble');
        const progressBarContainer = document.getElementById('progressBarContainer');
        const progressBar = document.getElementById('progressBar');
        const currentTimeUI = document.getElementById('currentTime');
        const totalTimeUI = document.getElementById('totalTime');
        const wyyIdInput = document.getElementById('wyyIdInput');
        const wyyDlBtn = document.getElementById('wyyDlBtn');
        
        const tabMahiru = document.getElementById('tabMahiru');
        const tabOnline = document.getElementById('tabOnline');
        const tabLocal = document.getElementById('tabLocal');
        const mahiruCountUI = document.getElementById('mahiruCount');
        const onlineCountUI = document.getElementById('onlineCount');
        const localCountUI = document.getElementById('localCount');

        const lyricsWrapper = document.getElementById('lyricsWrapper');

        let currentMode = 'mahiru', mahiruSongs = [], onlineSongs = [], localSongs = [], currentIndex = 0;        
        const mobileTouchUnlock = document.getElementById('mobileTouchUnlock');
        const unlockBtn = document.getElementById('unlockBtn');
        
        let playMode = 'loop'; 

        // 全局状态跟踪当前播放的歌曲信息
        let currentPlayingInfo = { name: "", url: "", id: null };
        let parsedLyrics = []; // 解析后的歌词数组 [{time: 秒数, text: "歌词"}]

        // 获取基于时间的动态问候语
        function getTimeGreeting() {
            const hour = new Date().getHours();
            if (hour >= 5 && hour < 12) {
                return "上午好！打起精神，今天也是美好的一天呢。";
            } else if (hour >= 12 && hour < 18) {
                return "下午好，累了的话就听首歌放松一下吧。";
            } else {
                return "晚上好，夜深了，听完这首歌就早点休息吧。";
            }
        }

        function isMobileDevice() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768;
        }

        function unlockMobileAudio() {
            audio.play().then(() => { audio.pause(); }).catch(e => console.log('激活中...'));
            mobileTouchUnlock.style.display = 'none';
            showBubbleWithTimer(getTimeGreeting());
            updateMediaSession(); 
        }
        unlockBtn.addEventListener('click', unlockMobileAudio);
        mobileTouchUnlock.addEventListener('click', unlockMobileAudio);

        async function initOnlinePlaylist() {
            try {
                const response = await fetch('./music/list.json');
                if (!response.ok) throw new Error('无法读取 list.json');
                const songsData = await response.json();
                
                if(songsData.mahiruSongs) {
                    mahiruSongs = songsData.mahiruSongs.map(song => ({ name: song.title, url: supabaseBaseUrl + encodeURIComponent(song.file), id: song.wyyId || null }));
                }
                if(songsData.onlineSongs) {
                    onlineSongs = songsData.onlineSongs.map(song => ({ name: song.title, url: supabaseBaseUrl + encodeURIComponent(song.file), id: song.wyyId || null }));
                }
                
                mahiruCountUI.innerText = mahiruSongs.length;
                onlineCountUI.innerText = onlineSongs.length;
                
                if(currentMode === 'mahiru') { 
                    renderPlaylist(); 
                    if (mahiruSongs.length > 0) loadSong(0, false); 
                }
            } catch (err) {
                trackListUI.innerHTML = `<li style="color: #ff7875; text-align: center; padding-top: 40px;">歌单初始化失败</li>`;
            }
        }

        function createDecorations() {
            const container = document.getElementById('decorations'); if (!container) return;
            for (let i = 0; i < 55; i++) {
                const petal = document.createElement('div'); petal.className = 'petal';
                petal.style.left = Math.random() * 100 + 'vw'; petal.style.top = Math.random() * -60 + 'px';
                const size = Math.random() * 8 + 7; petal.style.width = size + 'px'; petal.style.height = size + 'px';
                petal.style.animationDelay = Math.random() * 15 + 's'; petal.style.animationDuration = Math.random() * 8 + 7 + 's';
                petal.style.setProperty('--petal-scale', (Math.random() * 0.4 + 0.9).toFixed(2));
                container.appendChild(petal);
            }
        }
        createDecorations();

        tabMahiru.addEventListener('click', () => {
            if(currentMode === 'mahiru') return; currentMode = 'mahiru';
            tabMahiru.classList.add('active'); tabOnline.classList.remove('active'); tabLocal.classList.remove('active');
            renderPlaylist(); 
            if(mahiruSongs.length > 0) { loadSong(0, false); } else { trackListUI.innerHTML = `<li style="color: #5A4B41; text-align: center; padding-top: 50px; opacity: 0.6;">真昼歌单里空空如也哦</li>`; pauseAudio(); }
        });

        tabOnline.addEventListener('click', () => {
            if(currentMode === 'online') return; currentMode = 'online';
            tabOnline.classList.add('active'); tabMahiru.classList.remove('active'); tabLocal.classList.remove('active');
            renderPlaylist(); 
            if(onlineSongs.length > 0) { loadSong(0, false); } else { trackListUI.innerHTML = `<li style="color: #5A4B41; text-align: center; padding-top: 50px; opacity: 0.6;">内置歌单空空如也哦</li>`; pauseAudio(); }
        });

        tabLocal.addEventListener('click', () => {
            if(currentMode === 'local') return; currentMode = 'local';
            tabLocal.classList.add('active'); tabMahiru.classList.remove('active'); tabOnline.classList.remove('active');
            renderPlaylist();
            if(localSongs.length > 0) { loadSong(0, false); } else {
                trackListUI.innerHTML = `<li style="color: #5A4B41; text-align: center; padding-top: 50px; opacity: 0.6;">请点击左下方按钮载入本地音乐</li>`;
                pauseAudio();
            }
        });

        selectFolderBtn.addEventListener('click', async () => {
            try {
                if (!window.showDirectoryPicker) { alert('当前浏览器不支持此 API，请使用 PC 端的 Chrome / Edge 浏览器操作本地导入。'); return; }
                const dirHandle = await window.showDirectoryPicker(); localSongs = [];
                for await (const entry of dirHandle.values()) { if (entry.kind === 'file' && /\.(mp3|wav|ogg|flac)$/i.test(entry.name)) localSongs.push(entry); }
                if (localSongs.length === 0) { alert('该文件夹下没有找到音乐格式文件！'); return; }
                localSongs.sort((a, b) => a.name.localeCompare(b.name)); localCountUI.innerText = localSongs.length;
                currentMode = 'local'; tabLocal.classList.add('active'); tabOnline.classList.remove('active'); tabMahiru.classList.remove('active');
                renderPlaylist(); await loadSong(0, true);
                showBubbleWithTimer("成功读取了 " + localSongs.length + " 首本地歌曲~");
            } catch (err) { console.error(err); }
        });

        function getActiveList() {
            if (currentMode === 'mahiru') return mahiruSongs;
            if (currentMode === 'online') return onlineSongs;
            return localSongs;
        }

        function renderPlaylist() {
            trackListUI.innerHTML = ''; 
            const activeList = getActiveList();
            if (activeList.length === 0) return;
            
            activeList.forEach((item, index) => {
                const li = document.createElement('li'); 
                li.className = 'track-item';
                
                const displayName = (currentMode === 'local') ? item.name.replace(/\.[^/.]+$/, "") : item.name;
                
                const nameSpan = document.createElement('span');
                nameSpan.className = 'track-name';
                nameSpan.innerText = `${index + 1}. ${displayName}`;
                
                li.addEventListener('click', (e) => { 
                    if(e.target.classList.contains('track-dl-icon')) return; 
                    loadSong(index, true); 
                });
                
                li.appendChild(nameSpan);

                if (currentMode !== 'local') {
                    const dlIcon = document.createElement('span');
                    dlIcon.className = 'track-dl-icon';
                    dlIcon.innerHTML = '📥';
                    dlIcon.title = '下载这首音频';
                    
                    dlIcon.addEventListener('click', (e) => {
                        e.stopPropagation(); 
                        handleAudioDownload(item);
                    });
                    li.appendChild(dlIcon);
                }
                
                trackListUI.appendChild(li);
            });
            updateActiveHighlight();
        }

        function updateActiveHighlight() {
            const items = trackListUI.querySelectorAll('.track-item'); items.forEach(item => item.classList.remove('active'));
            if(items[currentIndex]) items[currentIndex].classList.add('active');
        }

        async function loadSong(index, autoPlay = false) {
            const activeList = getActiveList(); if (activeList.length === 0) return;
            currentIndex = index;
            if (currentMode === 'local') {
                const fileHandle = activeList[currentIndex]; const file = await fileHandle.getFile();
                audio.src = URL.createObjectURL(file); songTitle.innerText = file.name.replace(/\.[^/.]+$/, ""); songArtist.innerText = "本地音乐";
                currentPlayingInfo = { name: songTitle.innerText, url: "", id: null }; 
                clearLyrics("本地音乐暂无歌词");
            } else {
                const song = activeList[currentIndex]; audio.src = song.url; songTitle.innerText = song.name; 
                songArtist.innerText = (currentMode === 'mahiru') ? "しいなまひる 专属" : "网页内置歌单";
                currentPlayingInfo = { name: song.name, url: song.url, id: song.id };
                
                if(song.id) {
                    fetchLyrics(song.id);
                } else {
                    clearLyrics("未关联歌词 ID");
                }
            }
            updateActiveHighlight(); progressBar.style.width = '0%'; currentTimeUI.innerText = '00:00';
            
            updateMediaSession();

            if (autoPlay) { playAudio(); } else { pauseAudio(); }
        }

        /* ================= 歌词获取与解析核心逻辑 ================= */
        async function fetchLyrics(songId) {
            clearLyrics("正在加载歌词...");
            try {
                // 直接使用网易云公开无需凭证的歌词获取 API 接口
                const res = await fetch(`https://music.163.com/api/song/media?id=${songId}`);
                if (!res.ok) throw new Error();
                const data = await res.json();
                
                if (data && data.lyric) {
                    parseLyricText(data.lyric);
                } else {
                    clearLyrics("暂无纯歌词数据");
                }
            } catch (err) {
                clearLyrics("歌词加载失败或暂无歌词");
            }
        }

        function parseLyricText(lyricStr) {
            parsedLyrics = [];
            const lines = lyricStr.split('\n');
            const timeReg = /\[(\d+):(\d+)\.(\d+)\]/;
            
            lines.forEach(line => {
                const match = timeReg.exec(line);
                if (match) {
                    const minutes = parseInt(match[1]);
                    const seconds = parseInt(match[2]);
                    const milliseconds = parseInt(match[3]);
                    const time = minutes * 60 + seconds + (milliseconds / 1000);
                    const text = line.replace(timeReg, '').trim();
                    if (text) {
                        parsedLyrics.push({ time, text });
                    }
                }
            });

            parsedLyrics.sort((a, b) => a.time - b.time);
            renderLyricsUI();
        }

        function renderLyricsUI() {
            if (parsedLyrics.length === 0) {
                clearLyrics("歌词解析空");
                return;
            }
            lyricsWrapper.innerHTML = '';
            parsedLyrics.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'lyric-line';
                div.id = `lrc-${index}`;
                div.innerText = item.text;
                lyricsWrapper.appendChild(div);
            });
            lyricsWrapper.scrollTop = 0;
        }

        function clearLyrics(msg) {
            parsedLyrics = [];
            lyricsWrapper.innerHTML = `<div class="lyric-line" style="opacity: 0.6; padding-top: 40px;">${msg}</div>`;
        }

        function updateLyricsScroll(currentTime) {
            if (parsedLyrics.length === 0) return;
            
            let activeIndex = -1;
            for (let i = 0; i < parsedLyrics.length; i++) {
                if (currentTime >= parsedLyrics[i].time) {
                    activeIndex = i;
                } else {
                    break;
                }
            }
            
            if (activeIndex !== -1) {
                const allLines = lyricsWrapper.querySelectorAll('.lyric-line');
                allLines.forEach(line => line.classList.remove('active'));
                
                const activeLine = document.getElementById(`lrc-${activeIndex}`);
                if (activeLine && !activeLine.classList.contains('active')) {
                    activeLine.classList.add('active');
                    const containerHeight = lyricsWrapper.clientHeight;
                    const lineOffsetTop = activeLine.offsetTop;
                    const lineHeigh = activeLine.clientHeight;
                    lyricsWrapper.scrollTop = lineOffsetTop - (containerHeight / 2) + (lineHeigh / 2);
                }
            }
        }

        function playAudio() { 
            audio.play().then(() => {
                if ('mediaSession' in navigator) { navigator.mediaSession.playbackState = "playing"; }
            }).catch(() => { pauseAudio(); }); 
            playBtn.innerText = '暂停'; disc.style.animationPlayState = 'running'; tonearm.classList.add('playing'); 
        }
        
        function pauseAudio() { 
            audio.pause(); 
            if ('mediaSession' in navigator) { navigator.mediaSession.playbackState = "paused"; }
            playBtn.innerText = '播放'; disc.style.animationPlayState = 'paused'; tonearm.classList.remove('playing'); 
        }

        playBtn.addEventListener('click', () => { if (audio.paused) { playAudio(); } else { pauseAudio(); } });
        prevBtn.addEventListener('click', () => { handlePrevSong(); });

        function handlePrevSong() {
            const activeList = getActiveList(); if (activeList.length === 0) return;
            let idx = currentIndex;
            if (playMode === 'random') { idx = Math.floor(Math.random() * activeList.length); } else { idx = currentIndex - 1; if (idx < 0) idx = activeList.length - 1; }
            loadSong(idx, true); 
        }

        function handleNextSong(isAutoEnd = false) {
            const activeList = getActiveList(); if (activeList.length === 0) return;
            if (isAutoEnd && playMode === 'single') { audio.currentTime = 0; playAudio(); return; }
            let idx = currentIndex;
            if (playMode === 'random') { idx = Math.floor(Math.random() * activeList.length); if (activeList.length > 1 && idx === currentIndex) { idx = (idx + 1) % activeList.length; } } else { idx = currentIndex + 1; if (idx >= activeList.length) idx = 0; }
            loadSong(idx, true);
        }

        nextBtn.addEventListener('click', () => { handleNextSong(false); });
        audio.addEventListener('ended', () => { handleNextSong(true); });

        modeBtn.addEventListener('click', () => {
            if (playMode === 'loop') { playMode = 'random'; modeBtn.innerText = '🔀'; modeBtn.title = '随机播放'; showBubbleWithTimer("しいなまひる提示：已切换到随机播放模式。"); } 
            else if (playMode === 'random') { playMode = 'single'; modeBtn.innerText = '🔂'; modeBtn.title = '单曲循环'; showBubbleWithTimer("しいなまひる提示：要一直重复听这首歌吗？"); } 
            else { playMode = 'loop'; modeBtn.innerText = '🔁'; modeBtn.title = '列表循环'; showBubbleWithTimer("しいなまひる提示：已切换到列表循环模式。"); }
        });

        currentDlBtn.addEventListener('click', () => {
            if (!currentPlayingInfo.url) {
                showBubbleWithTimer("しいなまひる:本地导入的歌曲不能再次下载哦~");
                return;
            }
            handleAudioDownload(currentPlayingInfo);
        });

        window.addEventListener('keydown', (e) => {
            if (document.activeElement === wyyIdInput) return;
            if (e.code === 'Space' || e.keyCode === 32) { e.preventDefault(); if (audio.paused) { playAudio(); } else { pauseAudio(); } }
        });

        function formatTime(secs) { if (isNaN(secs)) return '00:00'; const m = Math.floor(secs / 60), s = Math.floor(secs % 60); return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`; }
        
        audio.addEventListener('timeupdate', () => { 
            if (!isNaN(audio.duration)) { 
                progressBar.style.width = `${(audio.currentTime / audio.duration) * 100}%`; 
                currentTimeUI.innerText = formatTime(audio.currentTime); 
                updateLyricsScroll(audio.currentTime);
            } 
        });
        
        audio.addEventListener('loadedmetadata', () => { totalTimeUI.innerText = formatTime(audio.duration); });
        progressBarContainer.addEventListener('click', (e) => { if (isNaN(audio.duration)) return; audio.currentTime = (e.offsetX / progressBarContainer.clientWidth) * audio.duration; });

        let bubbleTimer = null;
        function showBubbleWithTimer(text) { if (bubbleTimer) clearTimeout(bubbleTimer); bubble.innerText = text; bubble.style.opacity = '1'; bubbleTimer = setTimeout(() => { bubble.style.opacity = '0'; }, 5000); }
        mahiruSkin.addEventListener('click', () => { const q = ["别突然戳我呀...", "听音乐的时候要保持好心情哦。", "这首歌，我也很喜欢呢。", getTimeGreeting()]; showBubbleWithTimer(q[Math.floor(Math.random() * q.length)]); });

        wyyDlBtn.addEventListener('click', async () => {
            const songId = wyyIdInput.value.trim();
            if (!songId || !/^\d+$/.test(songId)) { showBubbleWithTimer("しいなまひる:请输入纯数字的歌曲 ID 呢。"); return; }
            showBubbleWithTimer("しいなまひる:正在为您向云端请求解析，请稍候...");
            wyyDlBtn.innerText = "解析中..."; wyyDlBtn.disabled = true;
            try {
                const response = await fetch(`${VERCEL_URL}/api/parse`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ songId: songId })
                });
                if (!response.ok) throw new Error("接口返回异常");
                const data = await response.json();
                if (data.success) {
                    showBubbleWithTimer(`❀ しいなまひる:成功解析！正在为您播放《${data.songName}》❀`);
                    audio.src = data.audioUrl;
                    songTitle.innerText = data.songName;
                    songArtist.innerText = data.artistName || "网易云在线点播";
                    
                    currentPlayingInfo = { name: data.songName, url: data.audioUrl, id: songId };

                    playAudio();
                    
                    // 【优化】：如果后端返回的数据包里包含了 lyric 字段，直接读取它；否则前端去兜底抓取
                    if (data.lyric) {
                        parseLyricText(data.lyric);
                    } else {
                        fetchLyrics(songId);
                    }
                    wyyIdInput.value = '';
                } else { showBubbleWithTimer("しいなまひる:点播失败：" + data.msg); }
            } catch (err) { 
                // 后端接口若没做变动或连接失败时，前端自己继续去拉取并渲染歌词，确保功能不挂掉
                fetchLyrics(songId);
                showBubbleWithTimer("しいなまひる:无法连接到云端 service，请确认 Vercel 后端部署状态？"); 
            } 
            finally { wyyDlBtn.innerText = "直接播放"; wyyDlBtn.disabled = false; }
        });

        /* ================= 音频下载分流控制 ================= */
        async function handleAudioDownload(songItem) {
            if (!songItem || !songItem.url) return;
            const fileName = songItem.name + ".mp3";

            if (isMobileDevice()) {
                const confirmDownload = confirm(`❀ 真昼提示 ❀\n确定要下载歌曲《${songItem.name}》到手机中吗？`);
                if (!confirmDownload) return;
                showBubbleWithTimer("正在拉取音频流，请稍候...");
                triggerStreamDownload(songItem.url, fileName);
            } 
            else {
                if (window.showSaveFilePicker) {
                    try {
                        showBubbleWithTimer("请选择您想存放音频的任意磁盘分区位置~");
                        const handle = await window.showSaveFilePicker({
                            suggestedName: fileName,
                            types: [{ description: '音频文件', accept: { 'audio/mpeg': ['.mp3'], 'audio/ogg': ['.ogg'], 'audio/wav': ['.wav'], 'audio/flac': ['.flac'] } }]
                        });
                        showBubbleWithTimer("正在向所选路径写入数据文件，请勿关闭网页...");
                        
                        const response = await fetch(songItem.url);
                        const blob = await response.blob();
                        const writable = await handle.createWritable();
                        await writable.write(blob);
                        await writable.close();
                        
                        showBubbleWithTimer("❀ 歌曲已成功写入指定位置！");
                    } catch (err) {
                        if (err.name !== 'AbortError') { 
                            triggerStreamDownload(songItem.url, fileName); 
                        }
                    }
                } else {
                    triggerStreamDownload(songItem.url, fileName);
                }
            }
        }

        function triggerStreamDownload(url, filename) {
            fetch(url)
                .then(response => response.blob())
                .then(blob => {
                    const blobUrl = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = blobUrl;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    URL.revokeObjectURL(blobUrl);
                    a.remove();
                })
                .catch(() => {
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    a.target = '_blank';
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                });
        }

        /* ================= Media Session 后台/锁屏联动 ================= */
        function updateMediaSession() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: songTitle.innerText,
                    artist: songArtist.innerText,
                    album: 'しいなまひる的治愈音乐盒',
                    artwork: [{ src: 'img/changpian.jpg', sizes: '512x512', type: 'image/jpeg' }]
                });
                navigator.mediaSession.setActionHandler('play', () => { playAudio(); });
                navigator.mediaSession.setActionHandler('pause', () => { pauseAudio(); });
                navigator.mediaSession.setActionHandler('previoustrack', () => { handlePrevSong(); });
                navigator.mediaSession.setActionHandler('nexttrack', () => { handleNextSong(false); });
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            initOnlinePlaylist();
            setTimeout(() => {
                showBubbleWithTimer(getTimeGreeting());
            }, 1000);
        });
    </script>
</body>
</html>
