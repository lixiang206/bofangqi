<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>しいなまひる的治愈音乐盒</title>
    <style>
        :root {
            --mahiru-gold: #F5E6CC;      
            --mahiru-pink: #FFF0F5;      
            --mahiru-blue: #E6F2FF;      
            --text-color: #5A4B41;       
            --accent-gold: #E6C594;
        }

        /* 核心修复：彻底锁死根节点，防止任何形式的滚动溢出白边 */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            height: 100vh; height: 100dvh;
            overflow: hidden;
            background-color: #f7ede2; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
        }

        /* 独立背景层，与内容分离，100%全屏覆盖 */
        .bg-layer {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh; height: 100dvh;
            background: linear-gradient(135deg, #f7ede2 0%, #f5cac3 100%);
            z-index: 1;
        }

        /* 主体内容包裹器 */
        .app-container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh; height: 100dvh;
            box-sizing: border-box;
            padding-bottom: 95px; /* 为底部播放器留出空间 */
        }

        /* 顶部清新导航栏 */
        .top-navbar {
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            flex-shrink: 0;
        }
        .top-logo { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 1.1rem; color: #4A3E3D; }
        .top-logo img { width: 30px; height: 30px; border-radius: 50%; animation: spin 20s linear infinite; }

        /* 核心响应式弹性双栏布局 */
        .main-content {
            flex: 1;
            display: flex;
            gap: 16px;
            padding: 16px;
            overflow: hidden; /* 关键：靠子容器自己内部滚动 */
            box-sizing: border-box;
        }

        /* 通用精致白底卡片面板 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(90, 75, 65, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 左侧：多功能音乐库卡片 */
        .sidebar-panel { width: 340px; flex-shrink: 0; padding: 16px; box-sizing: border-box; }
        .sidebar-title { font-size: 1rem; font-weight: bold; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
        
        .playlist-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
        .tab-btn {
            flex: 1; background: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.6);
            color: var(--text-color); padding: 8px; border-radius: 12px; font-size: 0.8rem;
            cursor: pointer; transition: all 0.25s ease; font-weight: 600;
        }
        .tab-btn.active { background: var(--accent-gold); color: white; border-color: var(--accent-gold); }

        /* 音乐库独立列表滚动带 */
        .track-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex: 1; }
        .track-list::-webkit-scrollbar { width: 5px; }
        .track-list::-webkit-scrollbar-thumb { background: rgba(90,75,65,0.15); border-radius: 10px; }

        .track-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 12px; border-radius: 12px; cursor: pointer; margin-bottom: 6px;
            transition: all 0.2s ease; background: rgba(255,255,255,0.2); gap: 8px;
        }
        .track-item:hover { background: rgba(255, 255, 255, 0.45); }
        .track-item.active { background: var(--mahiru-blue); border-left: 4px solid var(--accent-gold); }
        .track-item.active .track-name { color: #2B5797; font-weight: bold; }
        
        .track-item-left { display: flex; align-items: center; gap: 10px; width: 85%; }
        .track-item-avatar { width: 36px; height: 36px; border-radius: 8px; background: #eee url('img/changpian.jpg') no-repeat center; background-size: cover; flex-shrink: 0; }
        .track-details { display: flex; flex-direction: column; overflow: hidden; }
        .track-name { font-size: 0.85rem; color: var(--text-color); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-meta { font-size: 0.72rem; color: #8C7A6B; margin-top: 1px; }

        /* 扩展工具箱 */
        .wyy-download-panel {
            background: rgba(255,255,255,0.4); border-radius: 14px; padding: 12px; margin-top: 12px;
            border: 1px solid rgba(255,255,255,0.4);
        }
        .wyy-panel-title { font-size: 0.78rem; font-weight: bold; color: #8C7A6B; margin-bottom: 8px; }
        .wyy-download-box { display: flex; gap: 6px; align-items: center; }
        .wyy-input {
            flex-grow: 1; padding: 7px 10px; border: 1px solid rgba(90,75,65,0.15); 
            border-radius: 8px; outline: none; font-size: 0.78rem; color: var(--text-color); background: rgba(255,255,255,0.6);
        }
        .wyy-paste-btn {
            border: 1px solid rgba(90,75,65,0.15); border-radius: 8px; font-size: 0.85rem; cursor: pointer;
            background: rgba(255,255,255,0.6); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
        }
        .wyy-paste-btn:hover { background: rgba(255,255,255,0.9); }
        .wyy-btn {
            background: var(--accent-gold); color: white; border: none; padding: 0 12px; 
            border-radius: 8px; font-size: 0.78rem; font-weight: bold; height: 32px; cursor: pointer;
        }
        .wyy-btn:hover { background: #dfba85; }

        .btn-folder {
            background: var(--mahiru-pink); border: 1px dashed rgba(90,75,65,0.25); color: var(--text-color);
            padding: 8px; border-radius: 12px; font-size: 0.78rem; cursor: pointer; margin-top: 8px; font-weight: bold;
        }

        /* 中间：歌词面板修改为 Spotify 大字样式 */
        .lyrics-panel {
            flex: 1;
            padding: 40px 48px;
            box-sizing: border-box;
            background: linear-gradient(rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.5)), url('img/HLLn5bJa0AArBQe.jpg') no-repeat center center;
            background-size: cover;
        }
        .lyrics-wrapper {
            overflow-y: auto; height: 100%; width: 100%; scroll-behavior: smooth;
            display: flex; flex-direction: column; gap: 24px; padding-bottom: 200px; padding-top: 40px; box-sizing: border-box;
        }
        .lyrics-wrapper::-webkit-scrollbar { width: 0px; display: none; }
        
        /* Spotify 风格歌词行元素 */
        .lyric-line {
            font-size: 2rem; 
            font-weight: 800; 
            line-height: 1.4; 
            color: #3e322b; 
            opacity: 0.35; 
            transition: all 0.35s cubic-bezier(0.25, 1, 0.5, 1);
            text-align: left; 
            cursor: pointer;
            letter-spacing: -0.5px;
            text-shadow: 0 1px 2px rgba(255,255,255,0.4);
        }
        /* 激活时的 Spotify 行状态 */
        .lyric-line.active {
            opacity: 1; 
            color: #AA7A44; 
            transform: scale(1.02);
            transform-origin: left center;
            text-shadow: 0 2px 8px rgba(255,255,255,0.8);
        }

        /* 底部：固定播放器控制面板 */
        .bottom-player-panel {
            position: fixed; bottom: 12px; left: 12px; right: 12px; height: 76px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 18px; border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 10px 30px rgba(90, 75, 65, 0.08);
            display: grid; grid-template-columns: 1fr 1.8fr 1fr; align-items: center;
            padding: 0 20px; box-sizing: border-box; z-index: 10;
        }

        .player-left { display: flex; align-items: center; gap: 12px; overflow: hidden; }
        .current-cover { width: 46px; height: 46px; border-radius: 10px; background: url('img/changpian.jpg') no-repeat center; background-size: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .current-info { display: flex; flex-direction: column; overflow: hidden; }
        .current-title { font-size: 0.85rem; font-weight: bold; color: var(--text-color); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .current-artist { font-size: 0.72rem; color: #8C7A6B; margin-top: 2px; }

        .player-center { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .controls-buttons { display: flex; align-items: center; gap: 20px; }
        .controls-buttons button { background: none; border: none; color: #7A685A; font-size: 1.1rem; cursor: pointer; transition: color 0.2s; }
        .controls-buttons button:hover { color: var(--text-color); }
        .btn-main { background: var(--accent-gold) !important; color: white !important; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem !important; box-shadow: 0 3px 8px rgba(230,197,148,0.4); }
        .btn-main:hover { transform: scale(1.05); background: #dfba85 !important; }

        .progress-block { display: flex; align-items: center; width: 100%; max-width: 460px; gap: 10px; }
        .time-label { font-size: 0.68rem; color: #8C7A6B; min-width: 32px; }
        .progress-bar-container { flex-grow: 1; height: 4px; background: rgba(90,75,65,0.1); border-radius: 2px; cursor: pointer; position: relative; }
        .progress-bar { height: 100%; width: 0%; background: var(--accent-gold); border-radius: 2px; position: absolute; top: 0; left: 0; }

        .player-right { display: flex; align-items: center; justify-content: flex-end; gap: 10px; color: #8C7A6B; font-size: 0.78rem; }

        /* 看板娘小挂件 */
        .character-box { position: fixed; bottom: 100px; right: 25px; width: 100px; height: 150px; z-index: 100; pointer-events: none; }
        .mahiru-character { width: 100%; height: 100%; cursor: pointer; pointer-events: auto; background: url('img/lihui.png') no-repeat bottom center; background-size: contain; }
        .dialogue-bubble { position: absolute; bottom: 155px; right: 0; background: rgba(255,255,255,0.95); border: 1px solid rgba(90,75,65,0.15); color: var(--text-color); padding: 6px 10px; border-radius: 10px; font-size: 0.72rem; opacity: 0; transform: translateY(10px); transition: all 0.3s ease; pointer-events: none; white-space: nowrap; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .character-box:hover .dialogue-bubble { opacity: 1; transform: translateY(0); }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 移动端响应式断点排版 */
        @media (max-width: 850px) {
            .main-content { grid-template-columns: 1fr; flex-direction: column; overflow-y: auto; -webkit-overflow-scrolling: touch; }
            .sidebar-panel { width: 100%; height: 320px; flex-shrink: 0; }
            .lyrics-panel { height: 420px; flex-shrink: 0; padding: 24px; }
            .bottom-player-panel { grid-template-columns: 1.2fr 1.8fr; padding: 0 12px; height: 72px; }
            .player-right { display: none; }
            .lyric-line { font-size: 1.45rem; }
            .character-box { display: none; }
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <div class="app-container">
        <!-- 顶部导航 -->
        <div class="top-navbar">
            <div class="top-logo">
                <img src="img/changpian.jpg" alt="Logo">
                <span>しいなまひる's Box</span>
            </div>
        </div>

        <!-- 核心双栏面板 -->
        <div class="main-content">
            <!-- 左卡片：曲目库与点播 -->
            <div class="glass-panel sidebar-panel">
                <div class="sidebar-title">🎵 音乐库</div>
                <div class="playlist-tabs">
                    <button class="tab-btn active" id="tabMahiru">真昼 (<span id="mahiruCount">0</span>)</button>
                    <button class="tab-btn" id="tabOnline">内置 (<span id="onlineCount">0</span>)</button>
                    <button class="tab-btn" id="tabLocal">本地 (<span id="localCount">0</span>)</button>
                </div>
                <ul class="track-list" id="trackList">
                    <li style="color:#8C7A6B; text-align:center; padding-top:40px; font-size:0.78rem;">正在同步清单...</li>
                </ul>

                <!-- 剪切板粘贴点播控制台 -->
                <div class="wyy-download-panel">
                    <div class="wyy-panel-title">网易云快捷解析点播</div>
                    <div class="wyy-download-box">
                        <input type="text" id="wyyIdInput" class="wyy-input" placeholder="输入歌曲 ID">
                        <button id="wyyPasteBtn" class="wyy-paste-btn">📋</button>
                        <button id="wyyDlBtn" class="wyy-btn">播放</button>
                    </div>
                </div>
                <button class="btn-folder" id="selectFolderBtn">📂 挂载本地其它音乐文件夹</button>
            </div>

            <!-- 中右融合大卡片：Spotify大字歌词面板 -->
            <div class="glass-panel lyrics-panel">
                <div class="lyrics-wrapper" id="lyricsWrapper">
                    <div class="lyric-line" style="opacity: 0.8; padding-top: 100px; text-align: center; color: var(--accent-gold);">🎵 每一天，都有真昼陪在你的身边</div>
                </div>
            </div>
        </div>

        <!-- 底部控制栏 -->
        <div class="bottom-player-panel">
            <div class="player-left">
                <div class="current-cover"></div>
                <div class="current-info">
                    <div class="current-title" id="songTitle">正在等候开播...</div>
                    <div class="current-artist" id="songArtist">しいなまひる</div>
                </div>
            </div>

            <div class="player-center">
                <div class="controls-buttons">
                    <button id="modeBtn">🔁</button>
                    <button id="prevBtn">⏮</button>
                    <button id="playBtn" class="btn-main">▶</button>
                    <button id="nextBtn">⏭</button>
                </div>
                <div class="progress-block">
                    <span class="time-label" id="currentTime">00:00</span>
                    <div class="progress-bar-container" id="progressBarContainer">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    <span class="time-label" id="totalTime">00:00</span>
                </div>
            </div>

            <div class="player-right">
                <span>🎧 100% 独享</span>
            </div>
        </div>
    </div>

    <!-- 看板娘组件 -->
    <div class="character-box">
        <div class="dialogue-bubble" id="bubble">今天想听什么歌呢？</div>
        <div class="mahiru-character" id="mahiruSkin"></div>
    </div>

    <audio id="myAudio" crossorigin="anonymous"></audio>

    <script>
        const VERCEL_URL = window.location.origin; 
        const supabaseBaseUrl = "https://dqfnxybsrbheeatzxxjg.supabase.co/storage/v1/object/public/music/";
        
        const audio = document.getElementById('myAudio');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const modeBtn = document.getElementById('modeBtn');
        
        const selectFolderBtn = document.getElementById('selectFolderBtn');
        const wyyIdInput = document.getElementById('wyyIdInput');
        const wyyPasteBtn = document.getElementById('wyyPasteBtn');
        const wyyDlBtn = document.getElementById('wyyDlBtn');

        const songTitle = document.getElementById('songTitle');
        const songArtist = document.getElementById('songArtist');
        const trackListUI = document.getElementById('trackList');
        const progressBarContainer = document.getElementById('progressBarContainer');
        const progressBar = document.getElementById('progressBar');
        const currentTimeUI = document.getElementById('currentTime');
        const totalTimeUI = document.getElementById('totalTime');
        
        const tabMahiru = document.getElementById('tabMahiru');
        const tabOnline = document.getElementById('tabOnline');
        const tabLocal = document.getElementById('tabLocal');
        const mahiruCountUI = document.getElementById('mahiruCount');
        const onlineCountUI = document.getElementById('onlineCount');
        const localCountUI = document.getElementById('localCount');
        const lyricsWrapper = document.getElementById('lyricsWrapper');
        const mahiruSkin = document.getElementById('mahiruSkin');
        const bubble = document.getElementById('bubble');

        let currentMode = 'mahiru', mahiruSongs = [], onlineSongs = [], localSongs = [], currentIndex = 0;        
        let playMode = 'loop'; 
        let parsedLyrics = []; 

        async function initOnlinePlaylist() {
            try {
                const response = await fetch('./music/list.json');
                const songsData = await response.json();
                if(songsData.mahiruSongs) {
                    mahiruSongs = songsData.mahiruSongs.map(song => ({ name: song.title, url: supabaseBaseUrl + encodeURIComponent(song.file), id: song.wyyId || null }));
                }
                if(songsData.onlineSongs) {
                    onlineSongs = songsData.onlineSongs.map(song => ({ name: song.title, url: supabaseBaseUrl + encodeURIComponent(song.file), id: song.wyyId || null }));
                }
                mahiruCountUI.innerText = mahiruSongs.length;
                onlineCountUI.innerText = onlineSongs.length;
                if(currentMode === 'mahiru') { renderPlaylist(); if (mahiruSongs.length > 0) loadSong(0, false); }
            } catch (err) {
                trackListUI.innerHTML = `<li style="color:#8C7A6B; text-align:center; padding-top:40px; font-size:0.78rem;">未检测到可加载清单</li>`;
            }
        }

        tabMahiru.addEventListener('click', () => { if(currentMode === 'mahiru') return; currentMode = 'mahiru'; switchTab(tabMahiru); });
        tabOnline.addEventListener('click', () => { if(currentMode === 'online') return; currentMode = 'online'; switchTab(tabOnline); });
        tabLocal.addEventListener('click', () => { if(currentMode === 'local') return; currentMode = 'local'; switchTab(tabLocal); });

        function switchTab(activeTab) {
            [tabMahiru, tabOnline, tabLocal].forEach(t => t.classList.remove('active'));
            activeTab.classList.add('active'); renderPlaylist();
            const list = getActiveList(); if(list.length > 0) { loadSong(0, false); } else { pauseAudio(); }
        }

        async function handleFolderSelection() {
            try {
                if (!window.showDirectoryPicker) { alert('当前浏览器安全环境不支持本地物理文件夹映射'); return; }
                const dirHandle = await window.showDirectoryPicker(); localSongs = [];
                for await (const entry of dirHandle.values()) { if (entry.kind === 'file' && /\.(mp3|wav|ogg|flac)$/i.test(entry.name)) localSongs.push(entry); }
                if (localSongs.length === 0) return;
                localSongs.sort((a, b) => a.name.localeCompare(b.name)); localCountUI.innerText = localSongs.length;
                currentMode = 'local'; [tabMahiru, tabOnline].forEach(t => t.classList.remove('active')); tabLocal.classList.add('active');
                renderPlaylist(); await loadSong(0, true);
            } catch (err) { console.error(err); }
        }
        selectFolderBtn.addEventListener('click', handleFolderSelection);

        function getActiveList() { return currentMode === 'mahiru' ? mahiruSongs : (currentMode === 'online' ? onlineSongs : localSongs); }

        function renderPlaylist() {
            trackListUI.innerHTML = ''; const activeList = getActiveList();
            if (activeList.length === 0) return;
            activeList.forEach((item, index) => {
                const li = document.createElement('li'); li.className = 'track-item';
                const displayName = (currentMode === 'local') ? item.name.replace(/\.[^/.]+$/, "") : item.name;
                li.innerHTML = `<div class="track-item-left"><div class="track-item-avatar"></div><div class="track-details"><span class="track-name">${displayName}</span><span class="track-meta">Track #${index+1}</span></div></div>`;
                li.addEventListener('click', () => { loadSong(index, true); });
                trackListUI.appendChild(li);
            });
            updateActiveHighlight();
        }

        function updateActiveHighlight() { const items = trackListUI.querySelectorAll('.track-item'); items.forEach(item => item.classList.remove('active')); if(items[currentIndex]) items[currentIndex].classList.add('active'); }

        async function loadSong(index, autoPlay = false) {
            const activeList = getActiveList(); if (activeList.length === 0) return;
            currentIndex = index;
            if (currentMode === 'local') {
                const fileHandle = activeList[currentIndex]; const file = await fileHandle.getFile();
                audio.src = URL.createObjectURL(file); songTitle.innerText = file.name.replace(/\.[^/.]+$/, ""); songArtist.innerText = "本地物理挂载";
                clearLyrics("本地歌曲暂未配对在线歌词");
            } else {
                const song = activeList[currentIndex]; audio.src = song.url; songTitle.innerText = song.name; 
                songArtist.innerText = (currentMode === 'mahiru') ? "椎名真昼" : "在线库";
                if(song.id) { fetchLyrics(song.id); } else { clearLyrics("暂无绑定的云端歌词"); }
            }
            updateActiveHighlight(); progressBar.style.width = '0%'; currentTimeUI.innerText = '00:00';
            if (autoPlay) { playAudio(); } else { pauseAudio(); }
        }

        async function fetchLyrics(songId) {
            clearLyrics("正在检索歌词...");
            try {
                const res = await fetch(`https://music.163.com/api/song/media?id=${songId}`);
                const data = await res.json();
                if (data && data.lyric) { parseLyricText(data.lyric); } else { clearLyrics("暂无在线匹配文本"); }
            } catch (err) { clearLyrics("未找到在线歌词文件"); }
        }

        function parseLyricText(lyricStr) {
            parsedLyrics = []; const lines = lyricStr.split('\n'); const timeReg = /\[(\d+):(\d+)\.(\d+)\]/;
            lines.forEach(line => {
                const match = timeReg.exec(line);
                if (match) {
                    const time = parseInt(match[1]) * 60 + parseInt(match[2]) + (parseInt(match[3]) / 1000);
                    const text = line.replace(timeReg, '').trim();
                    if (text) parsedLyrics.push({ time, text });
                }
            });
            parsedLyrics.sort((a, b) => a.time - b.time); renderLyricsUI();
        }

        function renderLyricsUI() {
            if (parsedLyrics.length === 0) { clearLyrics("暂无歌词"); return; }
            lyricsWrapper.innerHTML = '';
            parsedLyrics.forEach((item, index) => {
                const div = document.createElement('div'); div.className = 'lyric-line'; div.id = `lrc-${index}`; div.innerText = item.text;
                div.addEventListener('click', () => { audio.currentTime = item.time; });
                lyricsWrapper.appendChild(div);
            });
            lyricsWrapper.scrollTop = 0;
        }

        function clearLyrics(msg) { parsedLyrics = []; lyricsWrapper.innerHTML = `<div class="lyric-line" style="opacity:0.7; padding-top:100px; text-align:center; color:var(--accent-gold); font-size:1.3rem;">${msg}</div>`; }

        function updateLyricsScroll(currentTime) {
            if (parsedLyrics.length === 0) return;
            let activeIndex = -1;
            for (let i = 0; i < parsedLyrics.length; i++) { if (currentTime >= parsedLyrics[i].time) { activeIndex = i; } else { break; } }
            if (activeIndex !== -1) {
                const allLines = lyricsWrapper.querySelectorAll('.lyric-line');
                allLines.forEach(line => line.classList.remove('active'));
                const activeLine = document.getElementById(`lrc-${activeIndex}`);
                if (activeLine && !activeLine.classList.contains('active')) {
                    activeLine.classList.add('active');
                    const containerHeight = lyricsWrapper.clientHeight;
                    lyricsWrapper.scrollTop = activeLine.offsetTop - (containerHeight / 2) + (activeLine.clientHeight / 2);
                }
            }
        }

        function playAudio() { audio.play().then(() => { playBtn.innerText = '⏸'; }).catch(() => { pauseAudio(); }); }
        function pauseAudio() { audio.pause(); playBtn.innerText = '▶'; }

        playBtn.addEventListener('click', () => { if (audio.paused) { playAudio(); } else { pauseAudio(); } });
        prevBtn.addEventListener('click', () => {
            const activeList = getActiveList(); if (activeList.length === 0) return;
            let idx = playMode === 'random' ? Math.floor(Math.random() * activeList.length) : currentIndex - 1;
            if (idx < 0) idx = activeList.length - 1; loadSong(idx, true);
        });

        function handleNextSong(isAutoEnd = false) {
            const activeList = getActiveList(); if (activeList.length === 0) return;
            if (isAutoEnd && playMode === 'single') { audio.currentTime = 0; playAudio(); return; }
            let idx = playMode === 'random' ? Math.floor(Math.random() * activeList.length) : currentIndex + 1;
            if (idx >= activeList.length) idx = 0; loadSong(idx, true);
        }
        nextBtn.addEventListener('click', () => { handleNextSong(false); });
        audio.addEventListener('ended', () => { handleNextSong(true); });

        modeBtn.addEventListener('click', () => {
            if (playMode === 'loop') { playMode = 'random'; modeBtn.innerText = '🔀'; } 
            else if (playMode === 'random') { playMode = 'single'; modeBtn.innerText = '🔂'; } 
            else { playMode = 'loop'; modeBtn.innerText = '🔁'; }
        });

        function formatTime(secs) { if (isNaN(secs)) return '00:00'; const m = Math.floor(secs / 60), s = Math.floor(secs % 60); return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`; }
        audio.addEventListener('timeupdate', () => { if (!isNaN(audio.duration)) { progressBar.style.width = `${(audio.currentTime / audio.duration) * 100}%`; currentTimeUI.innerText = formatTime(audio.currentTime); updateLyricsScroll(audio.currentTime); } });
        audio.addEventListener('loadedmetadata', () => { totalTimeUI.innerText = formatTime(audio.duration); });
        progressBarContainer.addEventListener('click', (e) => { if (isNaN(audio.duration)) return; audio.currentTime = (e.offsetX / progressBarContainer.clientWidth) * audio.duration; });

        // 看板娘随机语录
        let bubbleTimer = null;
        function showBubble(text) { if (bubbleTimer) clearTimeout(bubbleTimer); bubble.innerText = text; bubble.style.opacity = '1'; bubbleTimer = setTimeout(() => { bubble.style.opacity = '0'; }, 3500); }
        mahiruSkin.addEventListener('click', () => { const quotes = ["不管发生什么，真昼都会陪着你哦。", "听听音乐，把一天的疲惫都忘掉吧~", "一直在很努力地坚持着，你很棒呢！"]; showBubble(quotes[Math.floor(Math.random() * quotes.length)]); });

        // 一键自动提取剪切板里的歌曲 ID
        wyyPasteBtn.addEventListener('click', async () => {
            try {
                if (!navigator.clipboard || !navigator.clipboard.readText) return;
                const text = await navigator.clipboard.readText(); const trimmed = text.trim();
                const match = trimmed.match(/id=(\d+)/);
                if (match && match[1]) { wyyIdInput.value = match[1]; } else { wyyIdInput.value = trimmed; }
            } catch (err) { console.log("未能读取到剪贴板内容"); }
        });

        // 云端快捷点播内核（【核心修复点】添加自适应 HTTPS 协议替换，解决双端 Mixed Content 无法播放问题）
        async function handleWyyParsing() {
            const songId = wyyIdInput.value.trim();
            if (!songId || !/^\d+$/.test(songId)) return;
            wyyDlBtn.innerText = "..."; wyyDlBtn.disabled = true;
            try {
                const response = await fetch(`${VERCEL_URL}/api/parse`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ songId: songId })
                });
                const data = await response.json();
                if (data.success) {
                    showBubble(`为你开播：《${data.songName}》`);
                    
                    // 精确清洗音频直链协议头，防止被浏览器拦截
                    let cleanUrl = data.audioUrl;
                    if (cleanUrl.startsWith('http:')) {
                        cleanUrl = cleanUrl.replace('http:', 'https:');
                    }
                    
                    audio.src = cleanUrl; 
                    songTitle.innerText = data.songName; 
                    songArtist.innerText = data.artistName || "网易云点播";
                    playAudio(); 
                    if (data.lyric) { parseLyricText(data.lyric); } else { fetchLyrics(songId); }
                    wyyIdInput.value = '';
                } else { fetchLyrics(songId); }
            } catch (err) { fetchLyrics(songId); } finally { wyyDlBtn.innerText = "播放"; wyyDlBtn.disabled = false; }
        }
        wyyDlBtn.addEventListener('click', handleWyyParsing);

        window.addEventListener('DOMContentLoaded', initOnlinePlaylist);
    </script>
</body>
</html>
