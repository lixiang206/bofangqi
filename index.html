<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小さな恋のうた - 椎名真昼</title>
    <!-- 引入自定义样式，保持真昼主题的精致毛玻璃质感 -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <!-- 音乐盒整体容器布局 -->
    <div class="music-box-container">
        
        <!-- 【左侧板块】：黑胶唱片播放器 + 本地控制 -->
        <div class="player-card">
            <!-- 唱片机指针 -->
            <div class="stylus" id="stylus"></div>
            
            <!-- 黑胶唱片（旋转动画） -->
            <div class="disc-wrapper">
                <div class="vinyl-disc" id="vinylDisc">
                    <!-- 真昼的专辑封面头像 -->
                    <img src="./images/mahiru_cover.jpg" alt="封面" id="musicCover">
                </div>
            </div>

            <!-- 歌曲基本信息 -->
            <div class="song-info">
                <h2 id="songTitle">小さな恋のうた</h2>
                <p id="songArtist">椎名真昼 (石见舞菜香)</p>
            </div>

            <!-- 控制按钮组：保留上一首、播放/暂停、下一首 -->
            <div class="control-buttons">
                <button class="btn-ctrl" id="prevBtn" title="上一首">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button class="btn-play" id="playBtn">点击播放</button>
                <button class="btn-ctrl" id="nextBtn" title="下一首">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M16 18h2V6h-2M6 18l8.5-6L6 6z"/></svg>
                </button>
            </div>

            <!-- 本地搜索框：让用户可以在本地歌单中快速点歌 -->
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="输入本地歌曲名或歌手...">
                <button id="searchBtn">搜索</button>
            </div>

            <!-- 安全访问本地文件夹的后备按钮 -->
            <button class="btn-local-folder" id="localFolderBtn">📁 线上安全读取本地文件夹</button>
        </div>

        <!-- 【中间板块】：纯净歌词滚动显示面板 -->
        <div class="lyrics-card">
            <div class="lyrics-wrapper" id="lyricsWrapper">
                <!-- 歌词内容会通过 JS 动态渲染到这里 -->
                <div class="lyric-line active">歌词加载中...</div>
            </div>
        </div>

    </div>

    <!-- 【右下角】：保留真昼的精美全身立绘图片 -->
    <div class="mahiru-character">
        <img src="./images/mahiru_character.png" alt="椎名真昼">
    </div>

    <!-- 隐藏的音频标签 -->
    <audio id="mainAudio" src="./music/小さな恋のうた.mp3"></audio>

    <!-- 核心控制脚本 -->
    <script src="./search.js"></script>
    <script src="./main.js"></script>
</body>
</html>
