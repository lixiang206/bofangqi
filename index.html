<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>椎名真昼の全网音乐搜索盒 (Vercel 稳定修复版)</title>
    <style>
        :root {
            --mahiru-gold: #F5E6CC;      
            --mahiru-pink: #FFF0F5;      
            --mahiru-blue: #E6F2FF;      
            --text-color: #5A4B41;       
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--mahiru-pink), var(--mahiru-gold), var(--mahiru-blue));
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
            overflow: hidden;
            position: relative;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        .main-wrapper {
            display: flex;
            gap: 25px;
            z-index: 2;
            align-items: flex-start;
            max-width: 1050px;
            width: 95vw;
        }

        /* 播放器主体 */
        .player-container {
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 25px 22px;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(90, 75, 65, 0.12);
            text-align: center;
            width: 320px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            flex-shrink: 0;
        }

        .disc-area {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 15px;
        }

        .tonearm {
            position: absolute;
            top: -10px;
            right: 10px;
            width: 35px;
            height: 65px;
            background: #8B7E74;
            transform-origin: top center;
            transform: rotate(-25deg);
            transition: transform 0.5s ease;
            z-index: 10;
            clip-path: polygon(40% 0%, 60% 0%, 60% 80%, 100% 100%, 0% 100%);
        }

        .tonearm.playing { transform: rotate(0deg); }

        .disc {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: repeating-radial-gradient(#222, #111 4px, #222 5px);
            border: 8px solid #2d2d2d;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: rotateDisc 15s linear infinite;
            animation-play-state: paused;
        }

        .disc-cover {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: url('https://picsum.photos/200') no-repeat center;
            background-size: cover;
            border: 3px solid #000;
        }

        @keyframes rotateDisc {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .song-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .song-artist { font-size: 0.85rem; opacity: 0.75; margin-bottom: 12px; }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .controls button {
            background: var(--text-color);
            color: #fff;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-main { padding: 10px 30px; font-size: 0.95rem; border-radius: 50px; font-weight: bold;}
        .btn-side { padding: 8px 12px; font-size: 0.85rem; border-radius: 50%; }
        .controls button:hover { transform: scale(1.08); background: #7A695E; }

        /* 全网搜索区域 */
        .search-zone {
            background: rgba(255, 255, 255, 0.9);
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(90, 75, 65, 0.15);
        }
        .search-input-group {
            display: flex;
            gap: 6px;
        }
        .search-input-group input {
            flex-grow: 1;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #D1C7BD;
            font-size: 0.85rem;
            outline: none;
        }
        .search-input-group input:focus { border-color: #A79284; }
        .search-input-group button {
            background: #A79284;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            transition: background 0.2s;
        }
        .search-input-group button:hover { background: #8B7E74; }

        .btn-folder {
            background: none;
            color: var(--text-color);
            border: 1px solid var(--text-color);
            width: 100%;
            padding: 7px;
            border-radius: 8px;
            font-size: 0.78rem;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .btn-folder:hover { opacity: 1; }

        /* 中间歌词面板 */
        .lyric-container {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 28px;
            width: 340px;
            height: 390px;
            box-shadow: 0 15px 35px rgba(90, 75, 65, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.4);
            overflow: hidden;
            position: relative;
        }

        .lyric-wrapper {
            position: absolute;
            width: calc(100% - 40px);
            top: 170px; 
            transition: transform 0.3s ease-out;
            text-align: center;
        }

        .lyric-line {
            padding: 8px 0;
            font-size: 0.9rem;
            line-height: 1.5;
            color: rgba(90, 75, 65, 0.5);
            transition: all 0.3s ease;
            min-height: 24px;
        }

        .lyric-line.active {
            color: #FF6B81; 
            font-weight: bold;
            transform: scale(1.06);
        }

        /* 右侧结果面板 */
        .results-container {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 28px;
            width: 320px;
            height: 390px;
            box-shadow: 0 15px 35px rgba(90, 75, 65, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
        }

        .list-header-tabs {
            display: flex;
            border-bottom: 2px solid var(--mahiru-gold);
            margin-bottom: 10px;
            padding-bottom: 2px;
        }

        .tab-btn {
            background: none;
            border: none;
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--text-color);
            opacity: 0.5;
            cursor: pointer;
            padding: 4px 12px;
        }

        .tab-btn.active {
            opacity: 1;
            border-bottom: 3px solid var(--text-color);
        }

        .scroll-list-wrapper {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex-grow: 1;
        }

        .song-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.82rem;
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-bottom: 5px;
            background: rgba(255,255,255,0.3);
            border: 1px solid rgba(255,255,255,0.5);
            transition: all 0.2s;
        }

        .song-item:hover { 
            background: rgba(245, 230, 204, 0.6); 
            transform: translateX(3px);
        }
        .song-item.active { 
            background: var(--text-color); 
            color: #fff; 
            font-weight: bold; 
        }
        .song-item .sub-info { font-size: 0.72rem; opacity: 0.6; }
        .song-item.active .sub-info { color: #E6F2FF; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <!-- 左侧面板 -->
        <div class="player-container">
            <div class="disc-area">
                <div class="tonearm" id="tonearm"></div>
                <div class="disc" id="disc">
                    <div class="disc-cover" id="discCover"></div>
                </div>
            </div>

            <div class="song-title" id="songTitle">小さな恋のうた</div>
            <div class="song-artist" id="songArtist">椎名真昼 (石见舞菜香)</div>

            <div class="controls">
                <button class="btn-side" id="prevBtn">⏮</button>
                <button class="btn-main" id="playBtn">点击播放</button>
                <button class="btn-side" id="nextBtn">⏭</button>
            </div>

            <div class="search-zone">
                <div class="search-input-group">
                    <input type="text" id="searchInput" placeholder="输入歌名/歌手 (例: 叹云兮)...">
                    <button id="searchBtn">搜 索</button>
                </div>
            </div>

            <button class="btn-folder" id="selectFolderBtn">📂 线上安全读取本地文件夹</button>
            <audio id="myAudio" crossorigin="anonymous"></audio>
        </div>

        <!-- 中间面板：歌词 -->
        <div class="lyric-container">
            <div class="lyric-wrapper" id="lyricWrapper">
                <div class="lyric-line" style="padding-top: 100px;">输入歌曲搜索，或直接点击播放吧</div>
            </div>
        </div>

        <!-- 右侧面板 -->
        <div class="results-container">
            <div class="list-header-tabs">
                <button class="tab-btn active" id="tabOnline">线上云端搜索</button>
                <button class="tab-btn" id="tabLocal">本地随身听</button>
            </div>
            <ul class="scroll-list-wrapper" id="listWrapper">
                <li style="color: #999; text-align: center; padding-top: 60px; font-size:0.8rem;">在左侧输入框搜索看看吧 ♪</li>
            </ul>
        </div>
    </div>

    <script>
        const audio = document.getElementById('myAudio');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const selectFolderBtn = document.getElementById('selectFolderBtn');
        const tabOnline = document.getElementById('tabOnline');
        const tabLocal = document.getElementById('tabLocal');
        const listWrapper = document.getElementById('listWrapper');
        const disc = document.getElementById('disc');
        const tonearm = document.getElementById('tonearm');
        const songTitle = document.getElementById('songTitle');
        const songArtist = document.getElementById('songArtist');
        const lyricWrapper = document.getElementById('lyricWrapper');
        const discCover = document.getElementById('discCover');

        let onlineSongs = [];     
        let localSongs = [];      
        let currentTab = 'online'; 
        let currentIndex = 0;     
        let lyricData = [];       

        const defaultMahiruSong = {
            name: "小さな恋のうた",
            artist: "椎名真昼 (CV: 石见舞菜香)",
            url: "https://music.163.com/song/media/outer/url?id=1411545625.mp3",
            lrc: "[00:00.00]小さな恋のうた - 椎名真昼\n[00:03.00]词：上江洌清作 曲：MONGOL800\n[00:15.12]広い宇宙の 数ある一つ (在这宽广宇宙的无数星辰中)\n[00:21.85]青い地球の 広い世界で (在这蓝色地球的广阔世界里)\n[00:28.50]小さな恋の 思いは届く (微不足道的恋情 悄然传达)\n[00:35.10]小さな島の あなたのも特へ"
        };

        window.addEventListener('DOMContentLoaded', () => {
            audio.src = defaultMahiruSong.url;
            parseLyric(defaultMahiruSong.lrc);
            
            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') searchMusic();
            });
        });

        // ==================== 【全新 HTTPS 极速搜索引擎】 ====================
        searchBtn.addEventListener('click', searchMusic);

        async function searchMusic() {
            const keyword = searchInput.value.trim();
            if (!keyword) return alert('请输入歌名或歌手名~');

            listWrapper.innerHTML = `<li style="color:#666; text-align:center; padding-top:60px; font-size:0.8rem;">正在通过线上加密通道同步曲库...</li>`;

            try {
                // 更换为原生完美支持 HTTPS 且允许海外服务器跨域访问的高质量网易源接口
                const response = await fetch(`https://api.netease.tf/search?keywords=${encodeURIComponent(keyword)}`);
                const resData = await response.json();

                if (!resData.result || !resData.result.songs || resData.result.songs.length === 0) {
                    listWrapper.innerHTML = `<li style="color:#dd5555; text-align:center; padding-top:60px; font-size:0.8rem;">未能获取到匹配音源</li>`;
                    return;
                }

                const songs = resData.result.songs;
                onlineSongs = songs.map(item => {
                    const artistNames = item.artists ? item.artists.map(a => a.name).join('/') : '未知歌手';
                    return {
                        id: item.id,
                        name: item.name || "未知歌曲",
                        artist: artistNames,
                        // 采用官方标准高稳定性 HTTPS 音频直链转换器
                        url: `https://music.163.com/song/media/outer/url?id=${item.id}.mp3`,
                        pic: item.album && item.album.picUrl ? item.album.picUrl.replace(/^http:\/\//i, 'https://') : ''
                    };
                });

                currentTab = 'online';
                tabOnline.classList.add('active');
                tabLocal.classList.remove('active');
                
                renderList();

            } catch (err) {
                console.error(err);
                listWrapper.innerHTML = `<li style="color:#dd5555; text-align:center; padding-top:60px; font-size:0.8rem;">通道加载失败，请再次尝试搜索</li>`;
            }
        }

        // 获取并加载动态歌词
        async function fetchLrc(id) {
            try {
                const response = await fetch(`https://api.netease.tf/lyric?id=${id}`);
                const data = await response.json();
                if (data.lrc && data.lrc.lyric) {
                    parseLyric(data.lrc.lyric);
                } else {
                    showFallbackLyric();
                }
            } catch {
                showFallbackLyric();
            }
        }

        function showFallbackLyric() {
            parseLyric(`[00:00.00] 正在畅听全网同步高品质音源...\n[00:02.00] 椎名真昼正在陪你一起聆听优美旋律...`);
        }

        function renderList() {
            listWrapper.innerHTML = '';
            const currentList = (currentTab === 'online') ? onlineSongs : localSongs;

            if (currentList.length === 0) {
                listWrapper.innerHTML = `<li style="color: #999; text-align: center; padding-top: 60px; font-size:0.8rem;">列表空空如也哦</li>`;
                return;
            }

            currentList.forEach((song, index) => {
                const li = document.createElement('li');
                li.className = `song-item ${index === currentIndex ? 'active' : ''}`;
                li.innerHTML = `
                    <div>${index + 1}. ${song.name}</div>
                    <div class="sub-info">${song.artist}</div>
                `;
                li.addEventListener('click', () => { playSelectedSong(index); });
                listWrapper.appendChild(li);
            });
        }

        tabOnline.addEventListener('click', () => { currentTab = 'online'; tabOnline.classList.add('active'); tabLocal.classList.remove('active'); currentIndex = 0; renderList(); });
        tabLocal.addEventListener('click', () => { currentTab = 'local'; tabLocal.classList.add('active'); tabOnline.classList.remove('active'); currentIndex = 0; renderList(); });

        async function playSelectedSong(index) {
            const currentList = (currentTab === 'online') ? onlineSongs : localSongs;
            if (currentList.length === 0) return;

            currentIndex = index;
            renderList();

            const targetSong = currentList[currentIndex];
            songTitle.innerText = targetSong.name;
            songArtist.innerText = targetSong.artist;

            if (currentTab === 'online') {
                audio.src = targetSong.url;
                if (targetSong.pic) {
                    discCover.style.backgroundImage = `url('${targetSong.pic}')`;
                } else {
                    discCover.style.backgroundImage = "url('https://picsum.photos/200')";
                }
                // 异步获取歌词
                fetchLrc(targetSong.id);
            } else {
                const file = await targetSong.fileHandle.getFile();
                audio.src = URL.createObjectURL(file);
                discCover.style.backgroundImage = "url('https://picsum.photos/200')";
                parseLyric("[00:00.00] 正在播放本地选择的文件流\n[00:02.00] 属于周的私家乐库。");
            }
            playAudio();
        }

        function parseLyric(lrcText) {
            lyricData = [];
            lyricWrapper.innerHTML = '';
            const lines = lrcText.split('\n');
            const timeReg = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;
            
            lines.forEach(line => {
                const match = timeReg.exec(line);
                if (match) {
                    const minutes = parseInt(match[1]);
                    const seconds = parseInt(match[2]);
                    const milliseconds = parseInt(match[3]);
                    const time = minutes * 60 + seconds + (milliseconds > 99 ? milliseconds/1000 : milliseconds/100);
                    const text = line.replace(timeReg, '').trim();
                    if(text) lyricData.push({ time, text });
                }
            });

            if (lyricData.length === 0) {
                lyricWrapper.innerHTML = `<div class="lyric-line active" style="margin-top:100px;">正在畅听云端音乐...</div>`;
                return;
            }

            lyricData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'lyric-line';
                div.id = `lrc-${index}`;
                div.innerText = item.text;
                lyricWrapper.appendChild(div);
            });
        }

        audio.addEventListener('timeupdate', () => {
            if (lyricData.length === 0) return;
            const currentTime = audio.currentTime;
            let activeIndex = 0;

            for (let i = 0; i < lyricData.length; i++) {
                if (currentTime >= lyricData[i].time) activeIndex = i; else break;
            }

            const allLines = lyricWrapper.querySelectorAll('.lyric-line');
            allLines.forEach(line => line.classList.remove('active'));
            
            const activeLine = document.getElementById(`lrc-${activeIndex}`);
            if (activeLine) {
                activeLine.classList.add('active');
                lyricWrapper.style.transform = `translateY(-${activeIndex * 38}px)`;
            }
        });

        function playAudio() {
            audio.play().then(() => {
                playBtn.innerText = '暂停';
                disc.style.animationPlayState = 'running';
                tonearm.classList.add('playing');
            }).catch((err) => { console.log("等待激活音频通道", err); });
        }

        function pauseAudio() {
            audio.pause();
            playBtn.innerText = '播放';
            disc.style.animationPlayState = 'paused';
            tonearm.classList.remove('playing');
        }

        playBtn.addEventListener('click', () => { if (audio.paused) playAudio(); else pauseAudio(); });
        nextBtn.addEventListener('click', () => { const cl = (currentTab === 'online') ? onlineSongs : localSongs; if (cl.length > 0) playSelectedSong((currentIndex + 1) % cl.length); });
        prevBtn.addEventListener('click', () => { const cl = (currentTab === 'online') ? onlineSongs : localSongs; if (cl.length > 0) { let idx = currentIndex - 1; if (idx < 0) idx = cl.length - 1; playSelectedSong(idx); } });
        audio.addEventListener('ended', () => { const cl = (currentTab === 'online') ? onlineSongs : localSongs; if (cl.length > 0) playSelectedSong((currentIndex + 1) % cl.length); else pauseAudio(); });

        // 本地安全读取
        selectFolderBtn.addEventListener('click', async () => {
            try {
                const dirHandle = await window.showDirectoryPicker();
                localSongs = [];
                for await (const entry of dirHandle.values()) {
                    if (entry.kind === 'file' && /\.(mp3|wav|ogg|flac)$/i.test(entry.name)) {
                        localSongs.push({ name: entry.name.replace(/\.[^/.]+$/, ""), artist: "本地音频流", fileHandle: entry });
                    }
                }
                if (localSongs.length === 0) return alert('文件夹内未发现可用的音频文件');
                localSongs.sort((a, b) => a.name.localeCompare(b.name));
                currentTab = 'local';
                tabLocal.classList.add('active');
                tabOnline.classList.remove('active');
                currentIndex = 0;
                renderList();
                playSelectedSong(0);
            } catch (err) { console.warn("操作取消", err); }
        });
    </script>
</body>
</html>
