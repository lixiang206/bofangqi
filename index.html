<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>椎名真昼の治愈音乐盒</title>
    <style>
        /* ===================================================
           1. 电脑端原始样式（完全保留，未做任何改变）
           =================================================== */
        :root {
            --mahiru-gold: #F5E6CC;      
            --mahiru-pink: #FFF0F5;      
            --mahiru-blue: #E6F2FF;      
            --text-color: #5A4B41;       
            --accent-gold: #E6C594;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--mahiru-pink), var(--mahiru-gold), var(--mahiru-blue));
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
            overflow: hidden;
            position: relative;
        }

        /* 页面装饰：背景粒子 */
        .decorations {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        .petal {
            position: absolute;
            background: rgba(245, 230, 204, 0.6);
            border-radius: 50% 0 50% 50%;
            animation: float 10s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(-10px) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(105vh) translateX(100px) rotate(360deg); opacity: 0; }
        }

        /* 核心布局 */
        .main-wrapper {
            display: flex;
            gap: 30px;
            z-index: 2;
            align-items: flex-start;
        }

        /* ================= 播放器主体 ================= */
        .player-container {
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 35px 30px 25px;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(90, 75, 65, 0.12), 0 0 20px rgba(245, 230, 204, 0.5);
            text-align: center;
            width: 320px;
            border: 2px solid rgba(255, 255, 255, 0.7);
        }

        .disc-area {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
        }

        .tonearm {
            position: absolute;
            top: -10px;
            right: 20px;
            width: 35px;
            height: 70px;
            background: #8B7E74;
            transform-origin: top center;
            transform: rotate(-25deg);
            transition: transform 0.5s ease;
            z-index: 10;
            clip-path: polygon(40% 0%, 60% 0%, 60% 80%, 100% 100%, 0% 100%);
        }

        .tonearm.playing { transform: rotate(0deg); }

        .disc {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: repeating-radial-gradient(#222, #111 4px, #222 5px);
            border: 8px solid #2d2d2d;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: rotateDisc 15s linear infinite;
            animation-play-state: paused;
        }

        .disc-cover {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: url('img/changpian.jpg') no-repeat center;
            background-size: cover;
            border: 3px solid #000;
        }

        @keyframes rotateDisc {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .song-title {
            font-size: 1.15rem;
            font-weight: bold;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .song-artist { font-size: 0.85rem; opacity: 0.75; margin-bottom: 15px; }

        /* 进度条 */
        .progress-wrapper {
            margin-bottom: 20px;
            padding: 0 5px;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(90, 75, 65, 0.1);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            margin-bottom: 6px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-gold), var(--text-color));
            border-radius: 10px;
            position: absolute;
            top: 0;
            left: 0;
            transition: width 0.1s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            opacity: 0.7;
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .controls button {
            background: var(--text-color);
            color: #fff;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(90, 75, 65, 0.2);
        }

        .btn-main { padding: 12px 28px; font-size: 1rem; border-radius: 50px; }
        .btn-side { padding: 10px 15px; font-size: 0.9rem; border-radius: 50%; }
        .controls button:hover { transform: scale(1.08); background: #7A695E; }

        .btn-folder {
            background: #A79284 !important;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-folder:hover { background: #8B7E74; }

        /* ================= 右侧动态歌单面板 ================= */
        .playlist-container {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 25px;
            border-radius: 28px;
            height: 380px;
            box-shadow: 0 15px 35px rgba(90, 75, 65, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            width: 280px;
        }

        .playlist-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--mahiru-gold);
            padding-bottom: 8px;
        }

        .tab-btn {
            background: none;
            border: none;
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--text-color);
            opacity: 0.5;
            cursor: pointer;
            padding: 0 4px;
            transition: opacity 0.2s;
        }

        .tab-btn.active {
            opacity: 1;
            position: relative;
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--text-color);
            border-radius: 2px;
        }

        .track-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto; 
            flex-grow: 1;
        }

        .track-list::-webkit-scrollbar { width: 6px; }
        .track-list::-webkit-scrollbar-track { background: transparent; }
        .track-list::-webkit-scrollbar-thumb { background: rgba(90, 75, 65, 0.2); border-radius: 10px; }

        .track-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s ease;
            margin-bottom: 4px;
        }

        .track-item:hover { background: rgba(245, 230, 204, 0.6); }
        .track-item.active {
            background: var(--text-color);
            color: #fff;
            font-weight: bold;
        }

        /* 看板娘皮肤 */
        .mahiru-character {
            position: absolute;
            bottom: -20px;
            right: 30px;
            width: 220px;
            height: 350px;
            z-index: 3;
            cursor: pointer;
            transition: all 0.5s ease;
            background: url('img/lihui.png') no-repeat bottom center;
            background-size: contain;
        }

        .mahiru-character:hover { transform: translateY(-10px); }

        .dialogue-bubble {
            position: absolute;
            bottom: 310px;
            right: 40px;
            background: #fff;
            padding: 10px 16px;
            border-radius: 16px;
            font-size: 0.85rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
            pointer-events: none;
            white-space: nowrap;
            z-index: 4;
        }

        .dialogue-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            right: 40px;
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: #fff transparent;
        }

        .mahiru-character:hover .dialogue-bubble { opacity: 1; transform: translateY(0); }

        /* ===================================================
           2. 纯移动端手机适配（仅在屏幕小于 768px 时生效）
           =================================================== */
        @media (max-width: 768px) {
            body {
                align-items: flex-start;
                overflow-y: auto;
                height: auto;
                min-height: 100vh;
            }

            .main-wrapper {
                flex-direction: column;
                align-items: center;
                gap: 20px;
                padding: 15px;
                width: 100%;
                box-sizing: border-box;
                padding-bottom: 130px;
            }

            .player-container {
                width: 100%;
                max-width: 340px;
                padding: 25px 20px 20px;
            }

            .playlist-container {
                width: 100%;
                max-width: 340px;
                height: 260px;
            }

            .mahiru-character {
                width: 110px;
                height: 175px;
                right: 10px;
                bottom: -5px;
                opacity: 0.9;
            }

            .dialogue-bubble {
                bottom: 150px;
                right: 15px;
                font-size: 0.75rem;
                padding: 6px 12px;
            }
            .dialogue-bubble::after { right: 25px; }
        }
    </style>
</head>
<body>

    <div class="decorations" id="decorations"></div>

    <div class="main-wrapper">
        <div class="player-container">
            <div class="disc-area">
                <div class="tonearm" id="tonearm"></div>
                <div class="disc" id="disc">
                    <div class="disc-cover"></div>
                </div>
            </div>

            <div class="song-title" id="songTitle">未载入歌曲</div>
            <div class="song-artist" id="songArtist">请选择歌单</div>

            <div class="progress-wrapper">
                <div class="progress-bar-container" id="progressBarContainer">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="time-info">
                    <span id="currentTime">00:00</span>
                    <span id="totalTime">00:00</span>
                </div>
            </div>

            <div class="controls">
                <button class="btn-side" id="prevBtn">⏮</button>
                <button class="btn-main" id="playBtn">播放</button>
                <button class="btn-side" id="nextBtn">⏭</button>
            </div>

            <button class="btn-folder" id="selectFolderBtn">📂 打开本地其它文件夹</button>
            <audio id="myAudio"></audio>
        </div>

        <div class="playlist-container">
            <div class="playlist-tabs">
                <button class="tab-btn active" id="tabOnline">网页歌单 (<span id="onlineCount">0</span>)</button>
                <button class="tab-btn" id="tabLocal">本地文件夹 (<span id="localCount">0</span>)</button>
            </div>
            <ul class="track-list" id="trackList">
                <li style="color: #999; text-align: center; padding-top: 50px;">暂无歌曲</li>
            </ul>
        </div>
    </div>

    <div class="mahiru-character" id="mahiruSkin">
        <div class="dialogue-bubble" id="bubble">今天想听什么歌呢？</div>
    </div>

    <script>
        // ===================================================
        // ⚙️ 网页歌单歌曲管理配置：把你在 music 文件夹下的音乐名字直接填在下面！
        // ⚠️ 记得带上格式后缀（如 .mp3），名字需要与实际文件严格保持一致
        // ===================================================
        const myMusicFolderList = [
            "tanyunxi.mp3",
            "SpotiMate.io - Romantic Memories - 椎名真昼_CV.石見舞菜香_.mp3",
            "xiamuji.mp3"
        ];

        const audio = document.getElementById('myAudio');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const selectFolderBtn = document.getElementById('selectFolderBtn');
        const disc = document.getElementById('disc');
        const tonearm = document.getElementById('tonearm');
        const songTitle = document.getElementById('songTitle');
        const songArtist = document.getElementById('songArtist');
        const trackListUI = document.getElementById('trackList');
        const mahiruSkin = document.getElementById('mahiruSkin');
        const bubble = document.getElementById('bubble');
        
        const progressBarContainer = document.getElementById('progressBarContainer');
        const progressBar = document.getElementById('progressBar');
        const currentTimeUI = document.getElementById('currentTime');
        const totalTimeUI = document.getElementById('totalTime');

        const tabOnline = document.getElementById('tabOnline');
        const tabLocal = document.getElementById('tabLocal');
        const onlineCountUI = document.getElementById('onlineCount');
        const localCountUI = document.getElementById('localCount');

        let currentMode = 'online'; 
        let onlineSongs = [];       
        let localSongs = [];        
        let currentIndex = 0;       

        // 静态化初始化函数：不再发送网络请求，100% 避免跨域限制
        function initOnlinePlaylist() {
            onlineSongs = myMusicFolderList.map(name => {
                return {
                    name: name,
                    url: `./music/${encodeURIComponent(name)}`
                };
            });
            
            onlineCountUI.innerText = onlineSongs.length;
            
            if(currentMode === 'online') {
                renderPlaylist();
                if (onlineSongs.length > 0) {
                    loadSong(0, false);
                }
            }
        }

        // 背景粒子飘动
        function createDecorations() {
            const container = document.getElementById('decorations');
            const count = 12; 
            for (let i = 0; i < count; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.top = Math.random() * -20 + 'px';
                const size = Math.random() * 6 + 5;
                petal.style.width = size + 'px';
                petal.style.height = size + 'px';
                petal.style.animationDelay = Math.random() * 8 + 's';
                petal.style.animationDuration = Math.random() * 6 + 8 + 's';
                container.appendChild(petal);
            }
        }
        createDecorations();

        // 切换面板标签
        tabOnline.addEventListener('click', () => {
            if(currentMode === 'online') return;
            currentMode = 'online';
            tabOnline.classList.add('active');
            tabLocal.classList.remove('active');
            renderPlaylist();
            if(onlineSongs.length > 0) {
                loadSong(0, false);
            } else {
                trackListUI.innerHTML = `<li style="color: #999; text-align: center; padding-top: 50px;">网页歌单为空</li>`;
            }
        });

        tabLocal.addEventListener('click', () => {
            if(currentMode === 'local') return;
            currentMode = 'local';
            tabLocal.classList.add('active');
            tabOnline.classList.remove('active');
            renderPlaylist();
            if(localSongs.length > 0) {
                loadSong(0, false);
            } else {
                trackListUI.innerHTML = `<li style="color: #999; text-align: center; padding-top: 50px;">请点击左下方按钮载入本地文件夹</li>`;
                songTitle.innerText = "未载入文件夹";
                songArtist.innerText = "请点击下方载入本地音乐";
                pauseAudio();
            }
        });

        // 导入本地磁盘文件夹功能（保持原样）
        selectFolderBtn.addEventListener('click', async () => {
            try {
                if (!window.showDirectoryPicker) {
                    alert('当前移动端浏览器限制了文件读取 API，请使用 PC 端的 Chrome / Edge 浏览器操作本地文件夹导入。');
                    return;
                }
                const dirHandle = await window.showDirectoryPicker();
                localSongs = [];

                for await (const entry of dirHandle.values()) {
                    if (entry.kind === 'file' && /\.(mp3|wav|ogg|flac)$/i.test(entry.name)) {
                        localSongs.push(entry); 
                    }
                }

                if (localSongs.length === 0) {
                    alert('该文件夹下没有找到音乐格式文件！');
                    return;
                }

                localSongs.sort((a, b) => a.name.localeCompare(b.name));
                localCountUI.innerText = localSongs.length;

                currentMode = 'local';
                tabLocal.classList.add('active');
                tabOnline.classList.remove('active');
                
                renderPlaylist();
                await loadSong(0, true);
                bubble.innerText = "成功读取了 " + localSongs.length + " 首本地歌曲~";

            } catch (err) {
                console.error('用户取消或读取失败:', err);
            }
        });

        function renderPlaylist() {
            trackListUI.innerHTML = '';
            const activeList = (currentMode === 'online') ? onlineSongs : localSongs;

            if (activeList.length === 0 && currentMode === 'local') {
                trackListUI.innerHTML = `<li style="color: #999; text-align: center; padding-top: 50px;">暂无本地歌曲</li>`;
                return;
            }
            if (activeList.length === 0 && currentMode === 'online') {
                trackListUI.innerHTML = `<li style="color: #999; text-align: center; padding-top: 50px;">网页歌单内没有歌曲</li>`;
                return;
            }

            activeList.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = 'track-item';
                li.innerText = `${index + 1}. ${item.name.replace(/\.[^/.]+$/, "")}`;
                
                li.addEventListener('click', () => {
                    loadSong(index, true);
                });
                trackListUI.appendChild(li);
            });
            updateActiveHighlight();
        }

        function updateActiveHighlight() {
            const items = trackListUI.querySelectorAll('.track-item');
            items.forEach(item => item.classList.remove('active'));
            if(items[currentIndex]) items[currentIndex].classList.add('active');
        }

        async function loadSong(index, autoPlay = false) {
            const activeList = (currentMode === 'online') ? onlineSongs : localSongs;
            if (activeList.length === 0) return;
            
            currentIndex = index;
            
            if (currentMode === 'online') {
                const song = activeList[currentIndex];
                audio.src = song.url;
                songTitle.innerText = song.name.replace(/\.[^/.]+$/, "");
                songArtist.innerText = "网页内置歌单";
            } else {
                const fileHandle = activeList[currentIndex];
                const file = await fileHandle.getFile();
                audio.src = URL.createObjectURL(file);
                songTitle.innerText = file.name.replace(/\.[^/.]+$/, "");
                songArtist.innerText = "本地音乐";
            }

            updateActiveHighlight();
            progressBar.style.width = '0%';
            currentTimeUI.innerText = '00:00';

            if (autoPlay) { playAudio(); } else { pauseAudio(); }
        }

        function playAudio() {
            audio.play().catch(err => console.log("已准备就绪，点击播放即可启动"));
            playBtn.innerText = '暂停';
            disc.style.animationPlayState = 'running';
            tonearm.classList.add('playing');
        }

        function pauseAudio() {
            audio.pause();
            playBtn.innerText = '播放';
            disc.style.animationPlayState = 'paused';
            tonearm.classList.remove('playing');
        }

        playBtn.addEventListener('click', () => {
            const activeList = (currentMode === 'online') ? onlineSongs : localSongs;
            if (activeList.length === 0) return;
            if (audio.paused) { playAudio(); } else { pauseAudio(); }
        });

        prevBtn.addEventListener('click', () => {
            const activeList = (currentMode === 'online') ? onlineSongs : localSongs;
            if (activeList.length === 0) return;
            let nextIndex = currentIndex - 1;
            if (nextIndex < 0) nextIndex = activeList.length - 1;
            loadSong(nextIndex, true);
        });

        nextBtn.addEventListener('click', () => {
            const activeList = (currentMode === 'online') ? onlineSongs : localSongs;
            if (activeList.length === 0) return;
            let nextIndex = currentIndex + 1;
            if (nextIndex >= activeList.length) nextIndex = 0;
            loadSong(nextIndex, true);
        });

        audio.addEventListener('ended', () => {
            const activeList = (currentMode === 'online') ? onlineSongs : localSongs;
            if (activeList.length === 0) return;
            let nextIndex = currentIndex + 1;
            if (nextIndex >= activeList.length) nextIndex = 0;
            loadSong(nextIndex, true);
        });

        function formatTime(seconds) {
            if (isNaN(seconds)) return '00:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        audio.addEventListener('timeupdate', () => {
            if (!isNaN(audio.duration)) {
                const progressPercent = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = `${progressPercent}%`;
                currentTimeUI.innerText = formatTime(audio.currentTime);
            }
        });

        audio.addEventListener('loadedmetadata', () => {
            totalTimeUI.innerText = formatTime(audio.duration);
        });

        progressBarContainer.addEventListener('click', (e) => {
            if (isNaN(audio.duration)) return;
            const containerWidth = progressBarContainer.clientWidth;
            const clickX = e.offsetX; 
            const newTime = (clickX / containerWidth) * audio.duration;
            audio.currentTime = newTime;
        });

        mahiruSkin.addEventListener('click', () => {
            const quotes = ["别突然戳我呀...", "听音乐的时候要保持好心情哦。", "需要我为你泡杯茶吗？", "这首歌，我也很喜欢呢。"];
            bubble.innerText = quotes[Math.floor(Math.random() * quotes.length)];
        });

        window.addEventListener('DOMContentLoaded', initOnlinePlaylist);
    </script>
</body>
</html>
