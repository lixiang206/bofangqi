<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>しいなまひる的治愈音乐盒</title>
    <style>
        :root {
            --mahiru-gold: #F5E6CC;      
            --mahiru-pink: #FFF0F5;      
            --mahiru-blue: #E6F2FF;      
            --text-color: #5A4B41;       
            --accent-gold: #E6C594;
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            /* 默认电脑端背景图 */
            background: url('img/HLLn5bJa0AArBQe.jpg') no-repeat center center;
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color); overflow: hidden; position: relative;
        }

        .decorations {
            position: fixed; width: 100vw; height: 100vh; top: 0; left: 0;
            pointer-events: none; z-index: 10000000 !important; 
        }

        .petal {
            position: absolute; background: linear-gradient(135deg, #FFC0CB, #F5E6CC); 
            opacity: 0.92 !important; border-radius: 50% 0 50% 50%;
            animation: float linear infinite; transform-origin: center;
            box-shadow: 1px 1px 3px rgba(90, 75, 65, 0.15);
        }

        @keyframes float {
            0% { transform: translateY(-50px) translateX(0) rotate(0deg) scale(var(--petal-scale, 1)); opacity: 0; }
            10% { opacity: 0.92; }
            90% { opacity: 0.92; }
            100% { transform: translateY(105vh) translateX(180px) rotate(450deg) scale(var(--petal-scale, 1)); opacity: 0; }
        }

        .main-wrapper { display: flex; gap: 30px; z-index: 2; align-items: flex-start; }

        /* 修改：核心毛玻璃模糊透明效果 */
        .player-container {
            background: rgba(255, 255, 255, 0.45); /* 降低白底不透明度 */
            backdrop-filter: blur(20px) saturate(140%); /* 增强高斯模糊与色彩饱和度 */
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            padding: 35px 30px 25px; border-radius: 28px; 
            border: 2px solid rgba(255, 255, 255, 0.5); /* 柔和边框 */
            box-shadow: 0 15px 35px rgba(90, 75, 65, 0.1), 0 0 20px rgba(255, 255, 255, 0.2);
            text-align: center; width: 320px;
        }

        .disc-area { position: relative; width: 200px; height: 200px; margin: 0 auto 20px; }

        .tonearm {
            position: absolute; top: -10px; right: 20px; width: 35px; height: 70px; background: #8B7E74;
            transform-origin: top center; transform: rotate(-25deg); transition: transform 0.5s ease; z-index: 10;
            clip-path: polygon(40% 0%, 60% 0%, 60% 80%, 100% 100%, 0% 100%);
        }
        .tonearm.playing { transform: rotate(0deg); }

        .disc {
            width: 100%; height: 100%; border-radius: 50%;
            background: repeating-radial-gradient(#222, #111 4px, #222 5px);
            border: 8px solid #2d2d2d; box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            display: flex; justify-content: center; align-items: center;
            animation: rotateDisc 15s linear infinite; animation-play-state: paused;
        }

        .disc-cover { width: 100px; height: 100px; border-radius: 50%; background: url('img/changpian.jpg') no-repeat center; background-size: cover; border: 3px solid #000; }
        @keyframes rotateDisc { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .song-title { font-size: 1.15rem; font-weight: bold; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-artist { font-size: 0.85rem; opacity: 0.75; margin-bottom: 15px; }

        .progress-wrapper { margin-bottom: 20px; padding: 0 5px; }
        .progress-bar-container { width: 100%; height: 6px; background: rgba(90, 75, 65, 0.15); border-radius: 10px; cursor: pointer; position: relative; margin-bottom: 6px; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent-gold), var(--text-color)); border-radius: 10px; position: absolute; top: 0; left: 0; transition: width 0.1s linear; }
        .time-info { display: flex; justify-content: space-between; font-size: 0.75rem; opacity: 0.7; }

        .controls { display: flex; justify-content: center; align-items: center; gap: 12px; margin-bottom: 15px; }
        .controls button { background: var(--text-color); color: #fff; border: none; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 10px rgba(90, 75, 65, 0.2); }
        .btn-main { padding: 12px 24px; font-size: 1rem; border-radius: 50px; }
        .btn-side { padding: 10px 14px; font-size: 0.9rem; border-radius: 50%; }
        .btn-mode { padding: 10px 12px; font-size: 0.85rem; border-radius: 50%; background: #A79284 !important; }
        .controls button:hover { transform: scale(1.08); background: #7A695E; }

        .btn-folder { background: #A79284 !important; padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; color: white; border: none; cursor: pointer; transition: background 0.2s; width: 100%; box-sizing: border-box; }
        .btn-folder:hover { background: #8B7E74; }

        .wyy-download-box { margin-top: 15px; border-top: 1px dashed var(--accent-gold); padding-top: 15px; display: flex; gap: 8px; justify-content: center; align-items: center; }
        .wyy-input { width: 60%; padding: 6px 12px; border: 1px solid var(--accent-gold); border-radius: 20px; outline: none; font-size: 0.8rem; color: var(--text-color); background: rgba(255, 255, 255, 0.4); transition: all 0.2s; }
        .wyy-input:focus { background: rgba(255, 255, 255, 0.8); border-color: var(--text-color); }
        .wyy-btn { background: var(--text-color); color: white; border: none; padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; white-space: nowrap; box-shadow: 0 2px 6px rgba(90, 75, 65, 0.15); transition: all 0.2s; }
        .wyy-btn:hover { background: #7A695E; transform: scale(1.05); }
        .wyy-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        /* 修改：歌单面板同样适配更透亮的毛玻璃效果 */
        .playlist-container {
            background: rgba(255, 255, 255, 0.4); /* 降低白底不透明度 */
            backdrop-filter: blur(20px) saturate(140%);
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            padding: 25px; border-radius: 28px; height: 380px; width: 320px;
            box-shadow: 0 15px 35px rgba(90, 75, 65, 0.05); border: 2px solid rgba(255, 255, 255, 0.4);
            display: flex; flex-direction: column;
        }

        .playlist-tabs { display: flex; gap: 8px; margin-bottom: 15px; border-bottom: 2px solid rgba(90, 75, 65, 0.15); padding-bottom: 8px; justify-content: space-between; }
        .tab-btn { background: none; border: none; font-size: 0.82rem; font-weight: bold; color: var(--text-color); opacity: 0.6; cursor: pointer; padding: 0 2px; transition: opacity 0.2s; white-space: nowrap; }
        .tab-btn.active { opacity: 1; position: relative; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -10px; left: 0; width: 100%; height: 3px; background: var(--text-color); border-radius: 2px; }

        .track-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex-grow: 1; }
        .track-list::-webkit-scrollbar { width: 6px; }
        .track-list::-webkit-scrollbar-thumb { background: rgba(90, 75, 65, 0.2); border-radius: 10px; }

        .track-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: all 0.2s ease; margin-bottom: 4px; }
        .track-item:hover { background: rgba(255, 255, 255, 0.3); }
        .track-item.active { background: var(--text-color); color: #fff; font-weight: bold; }

        /* 真昼立牌与外链容器 */
        .character-box {
            position: absolute; bottom: -20px; right: 30px; width: 220px; height: 350px; z-index: 3;
        }

        .mahiru-character { 
            width: 100%; height: 100%; cursor: pointer; transition: all 0.5s ease; 
            background: url('img/lihui.png') no-repeat bottom center; background-size: contain; 
        }
        .character-box:hover .mahiru-character { transform: translateY(-10px); }

        .dialogue-bubble { position: absolute; bottom: 310px; right: 10px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(8px); padding: 10px 16px; border-radius: 16px; font-size: 0.85rem; box-shadow: 0 5px 15px rgba(0,0,0,0.08); opacity: 0; transform: translateY(10px); transition: all 0.4s ease; pointer-events: none; white-space: nowrap; z-index: 4; }
        .dialogue-bubble::after { content: ''; position: absolute; bottom: -8px; right: 40px; border-width: 8px 8px 0; border-style: solid; border-color: rgba(255, 255, 255, 0.85) transparent; }
        .character-box:hover .dialogue-bubble { opacity: 1; transform: translateY(0); }

        /* 立牌旁边的圆形外链点击跳转按钮 */
        .mahiru-link-btn {
            position: absolute; top: 10px; left: -60px; width: 54px; height: 54px;
            border-radius: 50%; border: 3px solid #fff; box-shadow: 0 4px 12px rgba(90, 75, 65, 0.25);
            background: url('img/changpian.jpg') no-repeat center; background-size: cover;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5; animation: buttonPulse 2s infinite ease-in-out;
        }
        .mahiru-link-btn:hover {
            transform: scale(1.15) rotate(20deg);
            box-shadow: 0 6px 16px rgba(230, 197, 148, 0.6);
            border-color: var(--accent-gold);
        }
        .link-tooltip {
            position: absolute; top: -35px; left: 50%; transform: translateX(-50%);
            background: rgba(90, 75, 65, 0.9); color: #fff; padding: 4px 8px;
            border-radius: 6px; font-size: 0.75rem; white-space: nowrap;
            opacity: 0; transition: opacity 0.2s; pointer-events: none;
        }
        .mahiru-link-btn:hover .link-tooltip { opacity: 1; }

        @keyframes buttonPulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        /* 移动端特殊适配 */
        @media (max-width: 768px) {
            body { 
                position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100vw; height: 100vh; overflow: hidden !important; align-items: center; 
                /* 手机端背景图切换 */
                background: url('img/xiaoermo.jpg') no-repeat center center;
                background-size: cover;
            }
            .main-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow-y: scroll; -webkit-overflow-scrolling: touch; flex-direction: column; align-items: center; gap: 20px; padding: 20px 15px 180px; box-sizing: border-box; }
            
            /* 手机端同步适配毛玻璃半透明 */
            .player-container, .playlist-container { 
                width: 100%; max-width: 340px; box-sizing: border-box; flex-shrink: 0; 
                backdrop-filter: blur(20px) saturate(140%);
                -webkit-backdrop-filter: blur(20px) saturate(140%);
            }
            .playlist-container { height: 280px; }
            
            .character-box { position: fixed !important; width: 110px; height: 175px; right: 15px; bottom: 10px; opacity: 0.95; z-index: 999999 !important; pointer-events: auto; }
            .mahiru-character { background-size: contain; }
            .character-box:hover .mahiru-character { transform: none !important; }
            
            .dialogue-bubble { position: fixed !important; bottom: 185px; right: 15px; font-size: 0.75rem; padding: 6px 12px; z-index: 1000000 !important; transform: translateY(0) !important; }
            .dialogue-bubble::after { right: 25px; }

            .mahiru-link-btn {
                top: -55px; left: 30px; width: 44px; height: 44px;
            }

            #mobileTouchUnlock { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(90, 75, 65, 0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 99999; display: flex; justify-content: center; align-items: center; color: #5A4B41; font-weight: bold; }
            .unlock-box { background: rgba(255, 255, 255, 0.95); padding: 25px 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.15); border: 2px solid var(--mahiru-gold); }
            .unlock-box button { background: #A79284; color: white; border: none; padding: 10px 24px; border-radius: 50px; font-size: 0.9rem; cursor: pointer; }
        }
        @media (min-width: 769px) { #mobileTouchUnlock { display: none !important; } }
    </style>
</head>
<body>

    <div id="mobileTouchUnlock">
        <div class="unlock-box">
            <p>❀ 欢迎来到しいなまひる的音乐盒 ❀<br><small style="color:#888; font-weight:normal;">点击下方按钮解锁手机端音频</small></p>
            <button id="unlockBtn">进入音乐盒</button>
        </div>
    </div>

    <div class="decorations" id="decorations"></div>

    <div class="main-wrapper">
        <div class="player-container">
            <div class="disc-area">
                <div class="tonearm" id="tonearm"></div>
                <div class="disc" id="disc"><div class="disc-cover"></div></div>
            </div>

            <div class="song-title" id="songTitle">正在加载歌单...</div>
            <div class="song-artist" id="songArtist">请稍候</div>

            <div class="progress-wrapper">
                <div class="progress-bar-container" id="progressBarContainer"><div class="progress-bar" id="progressBar"></div></div>
                <div class="time-info"><span id="currentTime">00:00</span><span id="totalTime">00:00</span></div>
            </div>

            <div class="controls">
                <button class="btn-side" id="prevBtn" title="上一首">⏮</button>
                <button class="btn-main" id="playBtn">播放</button>
                <button class="btn-side" id="nextBtn" title="下一首">⏭</button>
                <button class="btn-mode" id="modeBtn" title="切换播放模式">🔁</button>
            </div>

            <button class="btn-folder" id="selectFolderBtn">📂 打开本地其它文件夹</button>

            <div class="wyy-download-box">
                <input type="text" id="wyyIdInput" class="wyy-input" placeholder="输入网易云歌曲 ID">
                <button id="wyyDlBtn" class="wyy-btn">直接播放</button>
            </div>
            <audio id="myAudio"></audio>
        </div>

        <div class="playlist-container">
            <div class="playlist-tabs">
                <button class="tab-btn active" id="tabMahiru">真昼歌单 (<span id="mahiruCount">0</span>)</button>
                <button class="tab-btn" id="tabOnline">内置歌单 (<span id="onlineCount">0</span>)</button>
                <button class="tab-btn" id="tabLocal">本地文件夹 (<span id="localCount">0</span>)</button>
            </div>
            <ul class="track-list" id="trackList">
                <li style="color: #5A4B41; text-align: center; padding-top: 50px; opacity:0.6;">正在加载网页歌单...</li>
            </ul>
        </div>
    </div>

    <!-- 真昼立牌整体复合容器 -->
    <div class="character-box" id="characterBox">
        <!-- 外链点击圆形按钮 -->
        <div class="mahiru-link-btn" onclick="window.open('https://www.fsdm02.com/vodplay/WNsJJJJk-1-1.html', '_blank')" title="前往播放页">
            <div class="link-tooltip">去看真昼吧~</div>
        </div>
        <!-- 立牌本体 -->
        <div class="mahiru-character" id="mahiruSkin"></div>
        <!-- 对话气泡 -->
        <div class="dialogue-bubble" id="bubble">今天想听什么歌呢？</div>
    </div>

    <script>
        const VERCEL_URL = window.location.origin; 

        const supabaseBaseUrl = "https://dqfnxybsrbheeatzxxjg.supabase.co/storage/v1/object/public/music/";
        const audio = document.getElementById('myAudio');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const modeBtn = document.getElementById('modeBtn');
        const selectFolderBtn = document.getElementById('selectFolderBtn');
        const disc = document.getElementById('disc');
        const tonearm = document.getElementById('tonearm');
        const songTitle = document.getElementById('songTitle');
        const songArtist = document.getElementById('songArtist');
        const trackListUI = document.getElementById('trackList');
        const mahiruSkin = document.getElementById('mahiruSkin');
        const bubble = document.getElementById('bubble');
        const progressBarContainer = document.getElementById('progressBarContainer');
        const progressBar = document.getElementById('progressBar');
        const currentTimeUI = document.getElementById('currentTime');
        const totalTimeUI = document.getElementById('totalTime');
        
        const tabMahiru = document.getElementById('tabMahiru');
        const tabOnline = document.getElementById('tabOnline');
        const tabLocal = document.getElementById('tabLocal');
        const mahiruCountUI = document.getElementById('mahiruCount');
        const onlineCountUI = document.getElementById('onlineCount');
        const localCountUI = document.getElementById('localCount');

        let currentMode = 'mahiru', mahiruSongs = [], onlineSongs = [], localSongs = [], currentIndex = 0;        
        const mobileTouchUnlock = document.getElementById('mobileTouchUnlock');
        const unlockBtn = document.getElementById('unlockBtn');
        
        let playMode = 'loop'; 

        function unlockMobileAudio() {
            audio.play().then(() => { audio.pause(); }).catch(e => console.log('激活中...'));
            mobileTouchUnlock.style.display = 'none';
            showBubbleWithTimer("今天想听什么歌呢？");
        }
        unlockBtn.addEventListener('click', unlockMobileAudio);
        mobileTouchUnlock.addEventListener('click', unlockMobileAudio);

        async function initOnlinePlaylist() {
            try {
                const response = await fetch('./music/list.json');
                if (!response.ok) throw new Error('无法读取 list.json');
                const songsData = await response.json();
                
                if(songsData.mahiruSongs) {
                    mahiruSongs = songsData.mahiruSongs.map(song => ({ name: song.title, url: supabaseBaseUrl + encodeURIComponent(song.file) }));
                }
                if(songsData.onlineSongs) {
                    onlineSongs = songsData.onlineSongs.map(song => ({ name: song.title, url: supabaseBaseUrl + encodeURIComponent(song.file) }));
                }
                
                mahiruCountUI.innerText = mahiruSongs.length;
                onlineCountUI.innerText = onlineSongs.length;
                
                if(currentMode === 'mahiru') { 
                    renderPlaylist(); 
                    if (mahiruSongs.length > 0) loadSong(0, false); 
                }
            } catch (err) {
                trackListUI.innerHTML = `<li style="color: #ff7875; text-align: center; padding-top: 40px;">歌单初始化失败</li>`;
            }
        }

        function createDecorations() {
            const container = document.getElementById('decorations'); if (!container) return;
            for (let i = 0; i < 55; i++) {
                const petal = document.createElement('div'); petal.className = 'petal';
                petal.style.left = Math.random() * 100 + 'vw'; petal.style.top = Math.random() * -60 + 'px';
                const size = Math.random() * 8 + 7; petal.style.width = size + 'px'; petal.style.height = size + 'px';
                petal.style.animationDelay = Math.random() * 15 + 's'; petal.style.animationDuration = Math.random() * 8 + 7 + 's';
                petal.style.setProperty('--petal-scale', (Math.random() * 0.4 + 0.9).toFixed(2));
                container.appendChild(petal);
            }
        }
        createDecorations();

        tabMahiru.addEventListener('click', () => {
            if(currentMode === 'mahiru') return; currentMode = 'mahiru';
            tabMahiru.classList.add('active'); tabOnline.classList.remove('active'); tabLocal.classList.remove('active');
            renderPlaylist(); 
            if(mahiruSongs.length > 0) { loadSong(0, false); } else { trackListUI.innerHTML = `<li style="color: #5A4B41; text-align: center; padding-top: 50px; opacity: 0.6;">真昼歌单里空空如也哦</li>`; pauseAudio(); }
        });

        tabOnline.addEventListener('click', () => {
            if(currentMode === 'online') return; currentMode = 'online';
            tabOnline.classList.add('active'); tabMahiru.classList.remove('active'); tabLocal.classList.remove('active');
            renderPlaylist(); 
            if(onlineSongs.length > 0) { loadSong(0, false); } else { trackListUI.innerHTML = `<li style="color: #5A4B41; text-align: center; padding-top: 50px; opacity: 0.6;">内置歌单空空如也哦</li>`; pauseAudio(); }
        });

        tabLocal.addEventListener('click', () => {
            if(currentMode === 'local') return; currentMode = 'local';
            tabLocal.classList.add('active'); tabMahiru.classList.remove('active'); tabOnline.classList.remove('active');
            renderPlaylist();
            if(localSongs.length > 0) { loadSong(0, false); } else {
                trackListUI.innerHTML = `<li style="color: #5A4B41; text-align: center; padding-top: 50px; opacity: 0.6;">请点击左下方按钮载入本地音乐</li>`;
                pauseAudio();
            }
        });

        selectFolderBtn.addEventListener('click', async () => {
            try {
                if (!window.showDirectoryPicker) { alert('当前浏览器不支持此 API，请使用 PC 端的 Chrome / Edge 浏览器操作本地导入。'); return; }
                const dirHandle = await window.showDirectoryPicker(); localSongs = [];
                for await (const entry of dirHandle.values()) { if (entry.kind === 'file' && /\.(mp3|wav|ogg|flac)$/i.test(entry.name)) localSongs.push(entry); }
                if (localSongs.length === 0) { alert('该文件夹下没有找到音乐格式文件！'); return; }
                localSongs.sort((a, b) => a.name.localeCompare(b.name)); localCountUI.innerText = localSongs.length;
                currentMode = 'local'; tabLocal.classList.add('active'); tabOnline.classList.remove('active'); tabMahiru.classList.remove('active');
                renderPlaylist(); await loadSong(0, true);
                showBubbleWithTimer("成功读取了 " + localSongs.length + " 首本地歌曲~");
            } catch (err) { console.error(err); }
        });

        function getActiveList() {
            if (currentMode === 'mahiru') return mahiruSongs;
            if (currentMode === 'online') return onlineSongs;
            return localSongs;
        }

        function renderPlaylist() {
            trackListUI.innerHTML = ''; 
            const activeList = getActiveList();
            if (activeList.length === 0) return;
            activeList.forEach((item, index) => {
                const li = document.createElement('li'); li.className = 'track-item';
                const displayName = (currentMode === 'local') ? item.name.replace(/\.[^/.]+$/, "") : item.name;
                li.innerText = `${index + 1}. ${displayName}`; li.addEventListener('click', () => { loadSong(index, true); });
                trackListUI.appendChild(li);
            });
            updateActiveHighlight();
        }

        function updateActiveHighlight() {
            const items = trackListUI.querySelectorAll('.track-item'); items.forEach(item => item.classList.remove('active'));
            if(items[currentIndex]) items[currentIndex].classList.add('active');
        }

        async function loadSong(index, autoPlay = false) {
            const activeList = getActiveList(); if (activeList.length === 0) return;
            currentIndex = index;
            if (currentMode === 'local') {
                const fileHandle = activeList[currentIndex]; const file = await fileHandle.getFile();
                audio.src = URL.createObjectURL(file); songTitle.innerText = file.name.replace(/\.[^/.]+$/, ""); songArtist.innerText = "本地音乐";
            } else {
                const song = activeList[currentIndex]; audio.src = song.url; songTitle.innerText = song.name; 
                songArtist.innerText = (currentMode === 'mahiru') ? "しいなまひる 专属" : "网页内置歌单";
            }
            updateActiveHighlight(); progressBar.style.width = '0%'; currentTimeUI.innerText = '00:00';
            if (autoPlay) { playAudio(); } else { pauseAudio(); }
        }

        function playAudio() { audio.play().catch(() => { pauseAudio(); }); playBtn.innerText = '暂停'; disc.style.animationPlayState = 'running'; tonearm.classList.add('playing'); }
        function pauseAudio() { audio.pause(); playBtn.innerText = '播放'; disc.style.animationPlayState = 'paused'; tonearm.classList.remove('playing'); }

        playBtn.addEventListener('click', () => { if (audio.paused) { playAudio(); } else { pauseAudio(); } });
        
        prevBtn.addEventListener('click', () => { 
            const activeList = getActiveList(); 
            if (activeList.length === 0) return;
            
            let idx = currentIndex;
            if (playMode === 'random') {
                idx = Math.floor(Math.random() * activeList.length);
            } else {
                idx = currentIndex - 1; 
                if (idx < 0) idx = activeList.length - 1;
            }
            loadSong(idx, true); 
        });

        function handleNextSong(isAutoEnd = false) {
            const activeList = getActiveList();
            if (activeList.length === 0) return;

            if (isAutoEnd && playMode === 'single') {
                audio.currentTime = 0;
                playAudio();
                return;
            }

            let idx = currentIndex;
            if (playMode === 'random') {
                idx = Math.floor(Math.random() * activeList.length);
                if (activeList.length > 1 && idx === currentIndex) {
                    idx = (idx + 1) % activeList.length;
                }
            } else {
                idx = currentIndex + 1;
                if (idx >= activeList.length) idx = 0;
            }
            loadSong(idx, true);
        }

        nextBtn.addEventListener('click', () => { handleNextSong(false); });
        audio.addEventListener('ended', () => { handleNextSong(true); });

        modeBtn.addEventListener('click', () => {
            if (playMode === 'loop') {
                playMode = 'random'; modeBtn.innerText = '🔀'; modeBtn.title = '随机播放';
                showBubbleWithTimer("しいなまひる提示：已切换到随机播放模式。");
            } else if (playMode === 'random') {
                playMode = 'single'; modeBtn.innerText = '🔂'; modeBtn.title = '单曲循环';
                showBubbleWithTimer("しいなまひる提示：要一直重复听这首歌吗？");
            } else {
                playMode = 'loop'; modeBtn.innerText = '🔁'; modeBtn.title = '列表循环';
                showBubbleWithTimer("しいなまひ放模式：已切换到列表循环模式。");
            }
        });

        window.addEventListener('keydown', (e) => {
            if (document.activeElement === wyyIdInput) return;
            if (e.code === 'Space' || e.keyCode === 32) {
                e.preventDefault();
                if (audio.paused) { playAudio(); } else { pauseAudio(); }
            }
        });

        function formatTime(secs) { if (isNaN(secs)) return '00:00'; const m = Math.floor(secs / 60), s = Math.floor(secs % 60); return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`; }
        audio.addEventListener('timeupdate', () => { if (!isNaN(audio.duration)) { progressBar.style.width = `${(audio.currentTime / audio.duration) * 100}%`; currentTimeUI.innerText = formatTime(audio.currentTime); } });
        audio.addEventListener('loadedmetadata', () => { totalTimeUI.innerText = formatTime(audio.duration); });
        progressBarContainer.addEventListener('click', (e) => { if (isNaN(audio.duration)) return; audio.currentTime = (e.offsetX / progressBarContainer.clientWidth) * audio.duration; });

        let bubbleTimer = null;
        function showBubbleWithTimer(text) { if (bubbleTimer) clearTimeout(bubbleTimer); bubble.innerText = text; bubble.style.opacity = '1'; bubbleTimer = setTimeout(() => { bubble.style.opacity = '0'; }, 4000); }
        mahiruSkin.addEventListener('click', () => { const q = ["别突然戳我呀...", "听音乐的时候要保持好心情哦。", "这首歌，我也很喜欢呢。"]; showBubbleWithTimer(q[Math.floor(Math.random() * q.length)]); });

        const wyyIdInput = document.getElementById('wyyIdInput');
        const wyyDlBtn = document.getElementById('wyyDlBtn');

        wyyDlBtn.addEventListener('click', async () => {
            const songId = wyyIdInput.value.trim();
            if (!songId || !/^\d+$/.test(songId)) { showBubbleWithTimer("しいなまひる:请输入纯数字的歌曲 ID 呢。"); return; }

            showBubbleWithTimer("しいなまひる:正在为您向云端请求解析，请稍候...");
            wyyDlBtn.innerText = "解析中..."; wyyDlBtn.disabled = true;

            try {
                const response = await fetch(`${VERCEL_URL}/api/parse`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ songId: songId })
                });

                if (!response.ok) throw new Error("接口返回异常");
                const data = await response.json();
                
                if (data.success) {
                    showBubbleWithTimer(`❀ しいなまひる:成功解析！正在为您播放《${data.songName}》❀`);
                    audio.src = data.audioUrl;
                    songTitle.innerText = data.songName;
                    songArtist.innerText = data.artistName || "网易云在线点播";
                    playAudio();
                    wyyIdInput.value = '';
                } else {
                    showBubbleWithTimer("しいなまひる:点播失败：" + data.msg);
                }
            } catch (err) {
                showBubbleWithTimer("しいなまひる:无法连接到云端 service，请确认 Vercel 后端部署状态？");
            } finally {
                wyyDlBtn.innerText = "直接播放"; wyyDlBtn.disabled = false;
            }
        });

        window.addEventListener('DOMContentLoaded', initOnlinePlaylist);
    </script>
</body>
</html>
