<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>椎名真昼の治愈音乐盒</title>
    <style>
        /* ===================================================
           1. 电脑端原始样式（完全保留，未做任何改变）
           =================================================== */
        :root {
            --mahiru-gold: #F5E6CC;      
            --mahiru-pink: #FFF0F5;      
            --mahiru-blue: #E6F2FF;      
            --text-color: #5A4B41;       
            --accent-gold: #E6C594;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--mahiru-pink), var(--mahiru-gold), var(--mahiru-blue));
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
            overflow: hidden;
            position: relative;
        }

        /* 页面装饰：背景粒子 */
        .decorations {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        .petal {
            position: absolute;
            background: rgba(245, 230, 204, 0.6);
            border-radius: 50% 0 50% 50%;
            animation: float 10s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(-10px) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(105vh) translateX(100px) rotate(360deg); opacity: 0; }
        }

        /* 核心布局：左边放播放器，右边放动态歌单 */
        .main-wrapper {
            display: flex;
            gap: 30px;
            z-index: 2;
            align-items: flex-start;
        }

        /* ================= 播放器主体 ================= */
        .player-container {
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 35px 30px 25px;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(90, 75, 65, 0.12), 0 0 20px rgba(245, 230, 204, 0.5);
            text-align: center;
            width: 320px;
            border: 2px solid rgba(255, 255, 255, 0.7);
        }

        .disc-area {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
        }

        .tonearm {
            position: absolute;
            top: -10px;
            right: 20px;
            width: 35px;
            height: 70px;
            background: #8B7E74;
            transform-origin: top center;
            transform: rotate(-25deg);
            transition: transform 0.5s ease;
            z-index: 10;
            clip-path: polygon(40% 0%, 60% 0%, 60% 80%, 100% 100%, 0% 100%);
        }

        .tonearm.playing { transform: rotate(0deg); }

        .disc {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: repeating-radial-gradient(#222, #111 4px, #222 5px);
            border: 8px solid #2d2d2d;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: rotateDisc 15s linear infinite;
            animation-play-state: paused;
        }

        .disc-cover {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: url('img/changpian.jpg') no-repeat center;
            background-size: cover;
            border: 3px solid #000;
        }

        @keyframes rotateDisc {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .song-title {
            font-size: 1.15rem;
            font-weight: bold;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .song-artist { font-size: 0.85rem; opacity: 0.75; margin-bottom: 15px; }

        /* 进度条样式 */
        .progress-wrapper {
            margin-bottom: 20px;
            padding: 0 5px;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(90, 75, 65, 0.1);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            margin-bottom: 6px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-gold), var(--text-color));
            border-radius: 10px;
            position: absolute;
            top: 0;
            left: 0;
            transition: width 0.1s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            opacity: 0.7;
        }

        /* 控制按钮布局 */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .controls button {
            background: var(--text-color);
            color: #fff;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(90, 75, 65, 0.2);
        }

        .btn-main { padding: 12px 28px; font-size: 1rem; border-radius: 50px; }
        .btn-side { padding: 10px 15px; font-size: 0.9rem; border-radius: 50%; }
        .controls button:hover { transform: scale(1.08); background: #7A695E; }

        .btn-folder {
            background: #A79284 !important;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-folder:hover { background: #8B7E74; }

        /* ================= 右侧动态歌单面板 ================= */
        .playlist-container {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 25px;
            border-radius: 28px;
            height: 380px;
            box-shadow: 0 15px 35px rgba(90, 75, 65, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            width: 280px;
        }

        .playlist-title {
            font-size: 1rem;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--mahiru-gold);
            padding-bottom: 8px;
        }

        .track-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto; 
            flex-grow: 1;
        }

        .track-list::-webkit-scrollbar { width: 6px; }
        .track-list::-webkit-scrollbar-track { background: transparent; }
        .track-list::-webkit-scrollbar-thumb { background: rgba(90, 75, 65, 0.2); border-radius: 10px; }

        .track-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s ease;
            margin-bottom: 4px;
        }

        .track-item:hover { background: rgba(245, 230, 204, 0.6); }
        .track-item.active {
            background: var(--text-color);
            color: #fff;
            font-weight: bold;
        }

        /* ================= 真昼看板娘皮肤 ================= */
        .mahiru-character {
            position: absolute;
            bottom: -20px;
            right: 30px;
            width: 220px;
            height: 350px;
            z-index: 3;
            cursor: pointer;
            transition: all 0.5s ease;
            background: url('img/lihui.png') no-repeat bottom center;
            background-size: contain;
        }

        .mahiru-character:hover { transform: translateY(-10px); }

        .dialogue-bubble {
            position: absolute;
            bottom: 310px;
            right: 40px;
            background: #fff;
            padding: 10px 16px;
            border-radius: 16px;
            font-size: 0.85rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
            pointer-events: none;
            white-space: nowrap;
            z-index: 4;
        }

        .dialogue-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            right: 40px;
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: #fff transparent;
        }

        .mahiru-character:hover .dialogue-bubble { opacity: 1; transform: translateY(0); }


        /* ===================================================
           2. 纯粹的移动端手机适配（仅在屏幕小于 768px 时生效）
              绝对不会干扰到电脑端的显示效果
           =================================================== */
        @media (max-width: 768px) {
            body {
                align-items: flex-start; /* 手机端内容多时允许纵向滚动 */
                overflow-y: auto;
                height: auto;
                min-height: 100vh;
            }

            .main-wrapper {
                flex-direction: column; /* 转换为上下垂直排列 */
                align-items: center;
                gap: 20px;
                padding: 15px;
                width: 100%;
                box-sizing: border-box;
                padding-bottom: 130px; /* 留出底部空间，防止被缩小的真昼挡住 */
            }

            .player-container {
                width: 100%; /* 宽度占满手机屏幕 */
                max-width: 340px; /* 限制手机端最大宽度，防止拉伸变形 */
                padding: 25px 20px 20px;
            }

            .playlist-container {
                width: 100%;
                max-width: 340px;
                height: 260px; /* 手机端稍微缩短一点歌单高度 */
            }

            /* 看板娘在手机端等比缩小，避免遮挡和冲突 */
            .mahiru-character {
                width: 110px;
                height: 175px;
                right: 10px;
                bottom: -5px;
                opacity: 0.9;
            }

            /* 手机端的对话气泡相应调整 */
            .dialogue-bubble {
                bottom: 150px;
                right: 15px;
                font-size: 0.75rem;
                padding: 6px 12px;
            }
            .dialogue-bubble::after {
                right: 25px;
            }
        }
    </style>
</head>
<body>

    <div class="decorations" id="decorations"></div>

    <div class="main-wrapper">
        <div class="player-container">
            <div class="disc-area">
                <div class="tonearm" id="tonearm"></div>
                <div class="disc" id="disc">
                    <div class="disc-cover"></div>
                </div>
            </div>

            <div class="song-title" id="songTitle">未载入文件夹</div>
            <div class="song-artist" id="songArtist">请点击下方载入本地音乐</div>

            <div class="progress-wrapper">
                <div class="progress-bar-container" id="progressBarContainer">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="time-info">
                    <span id="currentTime">00:00</span>
                    <span id="totalTime">00:00</span>
                </div>
            </div>

            <div class="controls">
                <button class="btn-side" id="prevBtn">⏮</button>
                <button class="btn-main" id="playBtn">播放</button>
                <button class="btn-side" id="nextBtn">⏭</button>
            </div>

            <button class="btn-folder" id="selectFolderBtn">📂 打开本地歌曲文件夹</button>
            <audio id="myAudio"></audio>
        </div>

        <div class="playlist-container">
            <div class="playlist-title">真昼の待播歌单 (<span id="trackCount">0</span>)</div>
            <ul class="track-list" id="trackList">
                <li style="color: #999; text-align: center; padding-top: 50px;">暂无歌曲</li>
            </ul>
        </div>
    </div>

    <div class="mahiru-character" id="mahiruSkin">
        <div class="dialogue-bubble" id="bubble">今天想听什么歌呢？</div>
    </div>

    <script>
        // 原生 JavaScript 逻辑
        const audio = document.getElementById('myAudio');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const selectFolderBtn = document.getElementById('selectFolderBtn');
        const disc = document.getElementById('disc');
        const tonearm = document.getElementById('tonearm');
        const songTitle = document.getElementById('songTitle');
        const songArtist = document.getElementById('songArtist');
        const trackListUI = document.getElementById('trackList');
        const trackCountUI = document.getElementById('trackCount');
        const mahiruSkin = document.getElementById('mahiruSkin');
        const bubble = document.getElementById('bubble');
        
        const progressBarContainer = document.getElementById('progressBarContainer');
        const progressBar = document.getElementById('progressBar');
        const currentTimeUI = document.getElementById('currentTime');
        const totalTimeUI = document.getElementById('totalTime');

        let songs = [];           
        let currentIndex = 0;     

        // 生成粒子
        function createDecorations() {
            const container = document.getElementById('decorations');
            const count = 12; 
            for (let i = 0; i < count; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.top = Math.random() * -20 + 'px';
                const size = Math.random() * 6 + 5;
                petal.style.width = size + 'px';
                petal.style.height = size + 'px';
                petal.style.animationDelay = Math.random() * 8 + 's';
                petal.style.animationDuration = Math.random() * 6 + 8 + 's';
                container.appendChild(petal);
            }
        }
        createDecorations();

        // 读取本地文件夹
        selectFolderBtn.addEventListener('click', async () => {
            try {
                if (!window.showDirectoryPicker) {
                    alert('很抱歉，当前手机浏览器不支持直接读取本地文件夹，请尝试使用手机版 Chrome 或 Edge 浏览器。');
                    return;
                }
                const dirHandle = await window.showDirectoryPicker();
                songs = [];
                trackListUI.innerHTML = '';

                for await (const entry of dirHandle.values()) {
                    if (entry.kind === 'file' && /\.(mp3|wav|ogg|flac)$/i.test(entry.name)) {
                        songs.push(entry);
                    }
                }

                if (songs.length === 0) {
                    alert('该文件夹下没有找到支持的音乐文件格式！');
                    return;
                }

                songs.sort((a, b) => a.name.localeCompare(b.name));
                trackCountUI.innerText = songs.length;

                renderPlaylist();
                await loadSong(0);
                bubble.innerText = "成功读取了 " + songs.length + " 首歌，请聆听吧~";

            } catch (err) {
                console.error('用户取消或读取失败:', err);
            }
        });

        function renderPlaylist() {
            trackListUI.innerHTML = '';
            songs.forEach((fileHandle, index) => {
                const li = document.createElement('li');
                li.className = 'track-item';
                li.innerText = `${index + 1}. ${fileHandle.name.replace(/\.[^/.]+$/, "")}`;
                li.setAttribute('data-index', index);
                
                li.addEventListener('click', () => {
                    loadSong(index, true);
                });
                trackListUI.appendChild(li);
            });
        }

        async function loadSong(index, autoPlay = false) {
            if (songs.length === 0) return;
            
            currentIndex = index;
            const fileHandle = songs[currentIndex];
            const file = await fileHandle.getFile();
            
            const fileURL = URL.createObjectURL(file);
            audio.src = fileURL;
            
            songTitle.innerText = file.name.replace(/\.[^/.]+$/, "")
            songArtist.innerText = "本地音乐";

            const items = trackListUI.querySelectorAll('.track-item');
            items.forEach(item => item.classList.remove('active'));
            if(items[currentIndex]) items[currentIndex].classList.add('active');

            progressBar.style.width = '0%';
            currentTimeUI.innerText = '0
